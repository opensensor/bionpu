    # max-abs 4.84 (correct clamp band). Measurements committed at
    # results/basecalling/b-m6-fused-perts/measurements.json.
    attempted: |
      Stage-3 fused-perts artifact: bf16 weights (full 48-KiB slab
      acquired once per dispatch), bf16 input/output, kernel walks
      4 OC groups internally per timestep; 334 calls/dispatch instead
      of 1336. Implementation lands as:
        - linear_projection_fused.py (IRON, depth=1 weight ObjectFifo)
        - linear_projection_fused.cc (per-call inner OC-group loop)
        - runner_fused.cpp (bf16 wire format)
        - DoradoFastLinearProjectionFusedPerts in __init__.py
        - Makefile experiment=fused-perts target
    failed_with: null
    root_cause: |
      Per-call setup overhead in the per-group artifact (~422 µs/call
      x 1336 calls = 564 ms wall, vs ~120 ns of math per call). See
      conv_stem_layers_2_3/gaps.yaml entry  for the encoder-wide
      pattern; DESIGN-fusion.md is the kernel-local plan.
    workaround: |
      Implemented; pending silicon validation (B2). Build clean: the
