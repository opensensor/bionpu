      **Resolution path — closed-loop AIE2P compression microtest
      (scaffold landed 2026-04-25; awaiting silicon authorization):**
        * Microtest lives at
          tests/aie2p_microtests/dma_compression_loopback/. Two
          compute-tile passthrough cores joined by ONE SparseFifo
          (2:4 uint8); both endpoints are CoreTiles so the
          compression bit fires on TILE-DMA BDs (the AM029-
          documented use case 1), NOT on shim-side BDs (where the
          bit is not documented). Strips LSTM math, bf16, pruning,
          per-layer weight DMA, host_runner subprocess. SparseFifo
          itself is the thing under test; only its surrounding
          complexity is stripped.
        * Documented algorithm format: 8-bit samples + 32-bit mask
          + 256-bit word per AM029. Input is a deterministic
          2:4-sparse uint8 buffer (50% zeros per group of 4).
        * Two-rail oracle: round-trip should reproduce the input
          byte-for-byte if the tile-DMA contract is valid on AIE2P
          silicon.
        * Decision tree (encoded by harness.py):
          - PASS → tile-DMA compression contract is valid on this
            AIE2P silicon. 's failure is NOT in the
            documented compute-tile DMA path. Next: build a
            sibling shim-as-producer microtest to test the strong
            hypothesis (LSTM topology wedge is shim-side double-
            compression). If THAT wedges, the LSTM kernel needs
            re-routing through a memtile or compute-tile producer
            instead of shim-direct.
          - WEDGE → AIE2P client silicon does NOT honor the AM029-
            documented tile-DMA mode even on the documented shape.
            File with AMD with this microtest as the minimal
            repro; close as "wontfix-without-AMD".
            Update docs/.md AIE2P-divergence
            section.
          - MISMATCH → bit reaches silicon, round-trips, but with
            byte corruption. Inspect diff pattern (zero/nonzero
            positions, group boundaries, 256-bit-word boundaries)
            to narrow which contract piece is mis-implemented.
        * Microtest is reusable as a canary for future
          firmware/silicon revisions.

      Until the microtest runs, do NOT re-attempt to flip bit 31
      on a production xclbin — every wedge requires a TDR drain
      and contaminates downstream silicon timing measurements.

      **Silicon ratification 2026-04-25 (post- closure):
      VERDICT = PASS.** After closed the consumer-side
      attr-propagation gap and added the cross-module footgun
      guard, the dma_compression_loopback microtest ran on AIE2P
      silicon (Strix [0000:67:00.1], NPU FW 1.1.2.64, XRT 2.23.0,
      microtest xclbin sha256 faa970a2...) and produced byte-equal
      round-trips across 16 invocations spanning two seeds:
        * 1 iter,  seed 20260425: n_diff=0 / 4096, wall 0.245s
        * 5 iters, seed 20260425: n_diff=0 / 4096, wall 0.247s/iter
        * 10 iters, seed 42:      n_diff=0 / 4096, wall 0.107s/iter
        * No firmware errors (dmesg clean across all runs);
          runner returncode 0 every time.

      The AM029-documented compute-tile DMA compression contract
      (MM2S compress + S2MM decompress, both endpoints compute
      tiles, 8-bit samples, 32-bit mask, 256-bit word) IS valid
      on Ryzen AIE2P silicon. Resolves what the LSTM kernel's
      original wedge implied — the silicon honors the bit, the
      original wedge was caused by the compiler-side propagation
      gap and/or the LSTM topology pinning the bit
      on a shim-side BD where AM029 doesn't document it (now
      guarded by Part 2 of the fix).

      Diagnostic note (host-side bug discovered + fixed during
      ratification): the original microtest runner had bo_unused
      and bo_output swapped in the kernel-call argument list,
      producing all-zero output that masqueraded as a silicon
      MISMATCH. The vanilla ObjectFifo control variant
      (control_vanilla.py) failed identically with that ordering,
      isolating the bug to the runner. With the fix in place,
      both the SparseFifo variant and the vanilla control PASS
      byte-equal. The MISMATCH branch of the harness's decision
      tree was never silicon-side; the misorder is documented in
      runner.cpp:~140 to prevent recurrence.

      **Recommended next step:** sibling shim-as-producer microtest
      to test the LSTM topology specifically. Per the cross-module
      guard, the LSTM's shim-side compress_mm2s bit is now
      correctly skipped on the shim BD, but the consumer-side
      compute-tile S2MM still gets decompress_s2mm. The
      decompression engine on the consumer side will read whatever
      the shim ships — if the host BO is genuinely pre-compressed
      (sparsity_pass.py output), that's the documented use case
      and should work; if the host BO is dense, the decompressor
      will produce garbage. The sibling test should ship a
      pre-compressed payload from the host side.

      ** status: closed.** Documents the original
      wedge investigation, the diagnostic path through ,
      and the eventual silicon PASS. The microtest stays in place
      as a self-healing canary for future firmware/silicon
      revisions; if the AM029 contract regresses, the harness
      will surface it immediately.
