    attempted: " reported on 2026-04-25 ~16:30 UTC that this kernel's vendored xclbin produces non-deterministic / zero output on AIE2P silicon (their in lstm_cell_bf16_compressed/gaps.yaml). Diagnostic re-run at 2026-04-25 ~20:42 UTC against the SAME vendored artifacts (`bionpu/dispatch/_npu_artifacts/dorado_fast_lstm_cell_bf16/`, sha256 final.xclbin=4cd1372a..., insts.bin=caf97e41..., host_runner=d07b0c72... — all matching MANIFEST.md, untouched since commit 9d055dc on 2026-04-25 05:15 UTC). Bisect candidates eliminated: (A) vendored xclbin overwrite — REFUTED, sha256 matches MANIFEST and `git log` shows no commits to the artifact dir between 09:24 and 20:42; (B) in-process pyxrt regression — REFUTED, `bionpu/kernels/basecalling/lstm_cell_bf16/__init__.py` spawns `host_runner` directly via `subprocess.run`, not `bionpu/dispatch/npu.py`'s in-process backend, so 's loader never touches this op; (D) amdxdna/firmware update — REFUTED, dpkg.log shows the only `xrt_plugin-amdxdna` install was 2026-04-25 02:21 UTC (no live update during the regression window) and `modinfo amdxdna` matches that build; (E) kernel-source change — REFUTED, `git log --since=\"2026-04-25 12:00 UTC\" -- bionpu/kernels/basecalling/lstm_cell_bf16/` is empty (last commit there was 's original at 09:24 UTC). (C) NPU device state hang — CONFIRMED-AT-REGRESSION-WINDOW, REFUTED-AT-VERIFICATION-WINDOW: dmesg captured 1747+ amdxdna lines centered around kernel time 64882-65206s ≈ 16:34-16:40 UTC with `aie2_tdr_work: Device isn't making progress... Count 234`, `Firmware timeout state capture`, `DPU PC: 0xffffffff`, repeated `op: 0x0 msg: 0x1d000001 fence: unsignaled` — a DMA / submission-queue stall sustained over the observation window. By 20:42 UTC the device idled out (`xrt-smi examine -r aie-partitions` -> 'No hardware contexts running on device'); 3-run smoke + 5-invocation × 10-iter stress repros (state/g-t3.2-004/g-t3.2-004-{repro,stress}-20260425T20*.json) both produced bit-identical sha256=0528f2dc060296900f4e6b678584177d6c76a038bbead388ef8c179759b3dde5 across 60 dispatches, output max-abs 0.498, avg 44.0 ms / iter, no new amdxdna timeouts in dmesg post-repro."
    failed_with: null
    root_cause: "Most likely a transient firmware / hardware-context wedge on the NPU during 's 16:30 UTC silicon attempts. The dmesg signature (`op: 0x0 msg: 0x1d000001 fence: unsignaled`, `DPU PC: 0xffffffff`, `aie2_tdr_work: Device isn't making progress` Count growing 189→234) is consistent with a stuck DMA / queue, not a kernel-code or codegen fault. The wedge cleared on its own after TDR drained the in-flight contexts and the device idled; subsequent submissions execute correctly with bit-identical determinism. 's report is honestly captured — at the time they ran, the device WAS producing bad output — but it does not reflect a software-side regression in 's xclbin, 's dispatch layer, the fork merges, or any source under `bionpu/kernels/basecalling/lstm_cell_bf16/`. The 'since 16:30 UTC' framing is coincidence with 's first silicon attempt windowing onto an already-wedged device, not a clean bisect anchor."
    workaround: "Two-layer mitigation. (1) Operator: when bf16 LSTM kernels return zero or non-deterministic output on silicon, capture `dmesg | grep amdxdna | tail -50` and `xrt-smi examine -r aie-partitions`; if `aie2_tdr_work` / `Firmware timeout state capture` are present, the device is wedged. Recovery: `tools/actions/reset-npu.sh` (rmmod+modprobe amdxdna), or wait for TDR to drain (~5-10 min idle) and the device clears itself. (2) Test-side: `tests/test_lstm_compressed_npu.py::test_compressed_vs_dense_max_abs` and `::test_determinism_compressed_cell` already detect the zero-output signature and skip honestly via the reference; 's silicon tests should adopt the same pattern (skip-with-cited-cause when `np.abs(y).max == 0.0`). Status flagged for monitoring: if the wedge recurs, file an upstream amdxdna issue with the captured dmesg dump (`state/g-t3.2-004/dmesg-amdxdna-pre.log`)."
