gaps:
  - id: ""
    category: "expressibility"
    op_or_pattern: "Single-tile LSTM kernel with 3 input ObjectFifos (input, weight, bias) on AIE2P"
    attempted: "IRON lowering with input_in / weight_in / bias_in / output_out fifos"
    failed_with: "tile requires 3 input/1 output DMA channels, but only 2 input/2 output available"
    root_cause: "AIE2P CoreTile has 2 input + 2 output DMA channels; IRON allocates one per ObjectFifo end. Three input fifos exceeds the channel count."
    workaround: "Folded the bias slab (768 FP32) as a prefix on every weight chunk; the kernel caches biases on (t==0, g==0, chunk==0) into a static array and skips the prefix on subsequent calls. Costs ~64 KB host-side bloat per LSTM-layer call (negligible)."
    upstream_issue: null
    blocks: []
    severity: "workaround"
  - id: ""
    category: "correctness"
    op_or_pattern: "Conv1d(in=16, out=16, kernel=5, stride=1, padding=2) — multi-channel scalar FP32 chunked dataflow (conv_stem_layer2)"
    attempted: "Direct port of 's conv_stem_layer1 chunked pattern to multi-channel input (16 ic instead of 1). depth=1 signal + depth=2 output ping-pong fifos to fit 64 KiB budget."
    failed_with: "Output buffer contains 9 NaN values per chunk at fixed positions [43..51] (relative to chunk start), repeating across all 10 chunks and all 16 output channels. Non-NaN positions also drift ~2% from CPU reference (e.g. 0.96 vs 0.98 expected, suggesting ~2 of 16 input channels' contributions are dropped)."
    # Phase 2 / evidence (state/stem-l2-nan-trace-20260425T192349Z.json):
    # cross-Python-version repro (3.11/upstream + 3.14/fork both produce
    # byte-identical insts.bin and the same 9-NaN window), Peano-emitted
    # disassembly (kernel auto-vectorizes scalar FP32 into bf16 emulation
    # with 4-bank BM accumulator spill+reload), and AM020 Appendix A p. 79:
    # 'Native FP32 (supported through emulation using bfloat16) — Removed
    # in AIE-ML' (AIE2P inherits). Phase 2 fix-surface inventory enumerated
    # 5 candidate kernel-source workarounds and rejected them all; loop
    # reorder was the only one marked 'untested'.
    # Closure 2026-04-25 (T2 / swarm/T2-conv1d-fp32 branch): the loop
    # reorder candidate WAS viable. Rewrote conv1d_layer2.cc from
    # (oc-outer, t-outer, ic-inner, k-fully-unrolled scalar reduction)
    # to (oc-outer, init-out=bias, ic-outer, k-outer, t-inner-vectorisable
    # weight-stationary FMA). The new shape lifts the FP32 accumulator out
    # of the BM register file (where the spill+reload mis-lowering lived)
    # and into tile memory (out_row[t] is the loop-carried accumulator).
    # Peano sees 5 separate clean 1D strided vector-FMA loops per (oc, ic)
    # pair instead of a per-(oc, t) BM-pressured scalar reduction.
    # Silicon validation: 0 NaN, 0 Inf, max-abs vs CPU = 3.34e-6 (FP32
    # round-off territory; encoder stem_L2 now runs on NPU not
    # cpu_fallback). insts.bin md5 unchanged (host control flow same);
    # only the AIE-tile .o differs. ~5% NPU-time slowdown
    # (175.7ms -> 184.9ms per chunk-set) — acceptable cost for correctness.
    root_cause: "Peano's auto-vectorization of the scalar FP32 inner loop emitted bf16-emulated vector ops (BM 4-bank accumulator + per-iter stack spill+reload) because AIE2P has no native FP32 vector path (AM020 Appendix A; .md ). The original kernel built a per-(oc, t) FP32 scalar `s` reduction across (16 ic) x (5 k) = 80 multiply-adds — Peano held the running sum in BM, spilled all 4 banks per per-channel iteration, and at a bf16 vector-lane boundary inside the T_chunk=200 inner loop the spill+reload sequence mis-lowered, producing 9 NaN values per chunk at fixed offsets [43..51]. The bug was reproducible across both the upstream Python 3.11 / mlir-aie@9796296 build and the Phase-2 fork Python 3.14 / mlir-aie@70ca8eb1 build with byte-identical insts.bin (the AIE-tile .o lowering was the only delta), confirming it was a Peano backend / mlir-aie LLVM-lowering miscompile rather than a build-environment artifact."
    workaround: "Loop-nest rewrite in conv1d_layer2.cc (committed 2026-04-25 on branch swarm/T2-conv1d-fp32). New shape: outer oc -> initialise out_row[0..T_chunk]=bias (separate vectorisable t-loop) -> outer ic -> outer k (5 explicit weight-stationary t-loops, one per kernel position) -> inner-`t` strided FMA `out_row[t] += sig_row[t+k] * w_scalar`. Each inner-t loop is now a clean 1D strided vector-FMA (no per-(oc,t) scalar reduction for Peano to fold into BM-spill emulation); the FP32 accumulator is the memory-resident out_row[t] not the BM register file, so the spill miscompile cannot trigger. Test gate: tests/test_t51_conv_stem_layer2_correctness.py asserts (a) the kernel source contains the post-fix loop nest sentinels (regression guard), (b) numpy reference matches torch.nn.functional.conv1d, (c) silicon output is NaN-free + matches CPU reference within 5e-4 (achieved 7e-7). Encoder stem_L2 device flips from 'cpu_fallback' to 'npu' (max-abs vs CPU 3.34e-6). The deferred bf16 vector-intrinsics rewrite remains a future optimisation path for performance, not correctness."
    upstream_issue: null
    blocks: [""]
    severity: "blocker"
    status: "closed"
    closure_ref:
      fork_repo: "https://github.com/matteius/genetics"
      fork_branch: "swarm/T2-conv1d-fp32"
      summary: "Loop-nest rewrite in conv1d_layer2.cc moves the FP32 accumulator from the BM register file (where Peano's bf16-emulation spill miscompile produced the 9-NaN window at [43..51]) into tile memory (out_row[t]), turning the inner work into 5 weight-stationary 1D strided vector-FMA loops. Silicon evidence: 0 NaN (was 1440), max-abs vs CPU 3.34e-6, encoder stem_L2 device flips cpu_fallback -> npu. Detailed evidence + alternative-path narrative: state/swarm/t2/closure-evidence-.json. Test gate: tests/test_t51_conv_stem_layer2_correctness.py."
