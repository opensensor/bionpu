  - id: "B-m12-long-shape-L1667"
    category: "shape_coverage"
    op_or_pattern: "Production-shape (long) artifacts for DoradoFastConvStemLayer{2,3} paired with the LSTM L=1667 path"
    attempted: |
      Built the L1667 sibling artifacts via the existing Makefile:
        make NPU2=1 layer=2 time=10000 chunk=200 all
        make NPU2=1 layer=3 time=10000 in_time=10018 out_time=1667 all
      Installed at
        bionpu/dispatch/_npu_artifacts/dorado_fast_conv_stem_layer2_L1667/
        bionpu/dispatch/_npu_artifacts/dorado_fast_conv_stem_layer3_L1667/
      with leaves final.xclbin / insts.bin / host_runner. Both op
      classes grew a ``seq_len`` constructor arg that names the LSTM
      timestep count (334 short / 1667 long), mirroring
      DoradoFastLstmCellBf16Acc. Layer 3 derives t_out=seq_len (since
      stride=6 reduces 10000 -> 1667 exactly) and padded_len=10018.
      Encoder.py passes ``seq_len=expected_lstm_l`` derived from the
      raw signal length. The legacy short-shape path is byte-identical;
      the long-shape path is purely additive.
    failed_with: null
    root_cause: |
      Legacy artifacts shape-checked the input as (1, 16, 2000) and
      produced (1, 16, 2000) (L2) / (1, 96, 334) (L3). The encoder's
      production_long path feeds (1, 16, 10000), so both layers fell
      back to CPU. Building second xclbins with the IRON loop-trip-
      count adjusted for 50 chunks (L2) and 1667 timesteps x 6 OC
      groups = 10002 kernel invocations (L3) restores the NPU path.
    workaround: |
      Silicon-validated B_M12_PASS at
      results/basecalling/b-m12-long-shape-rollout/measurements.json:
        L2 subprocess wall/iter ~1020 ms (kernel ~912 ms)
