    op_or_pattern: "BD-emit pass `Enable_Compression` bit on AIE2P"
    attempted: "'s SparseFifo lowers to `aie.objectfifo` plus discardable attributes (`aie.compress_mm2s = true`, `aie.decompress_s2mm = true`, `aie.sparsity_pattern = \"N:M\"`, `aie.sparsity_n = N`, `aie.sparsity_m = M`). invoked the SparseFifo for the bf16 LSTM cell's weight stream. The expected runtime contract per `aie.iron.sparse` module docstring is: the active backend's BD-emit pass reads back `aie.compress_mm2s` / `aie.decompress_s2mm` and flips the per-channel `Enable_Compression` bit on the BD config words (compute-tile DMA, AM020 Ch. 2 p. 27 + `aie_registers_aie2.json`). Verified at silicon: a build with synthetic 2:4-pruned weights produced output bit-identical to the dense path, but the wire DMA volume measured equal to the dense total (rather than the theoretical 50% reduction)."
    failed_with: null
    root_cause: "The fork's BD-emit pass at `lib/Dialect/AIEX/Transforms/AIEDmaToNpu.cpp:655` writes `words[1] = 0; // Enable_Compression` unconditionally — the SparseFifo's discardable attributes survive on the IR but no BD bit flips. 's SparseFifo module docstring explicitly anticipates this: 'If the active backend doesn't yet honor the attribute (early AIE2P silicon-driver versions; fork rebuild not yet propagated), the design remains compilable and runs as a non-sparse equivalent — the attribute is lowering metadata, not a structural ObjectFifo change.' The plan's brief encodes the same expectation: 'Cut path: if 's SparseFifo lowering diverges between AIE-ML and AIE2P (per AM020 caveat), falls back to dense-weight bf16 LSTM and documents the divergence; weight-DMA-reduction goal becomes future-work for Phase 3.'"
    workaround: " takes the cut path explicitly. **Math-side**: weights are still pruned offline to N:M structural sparsity by `tracks/basecalling/quant/sparsity_pass.py`, so the consumer kernel sees real zeros at the pruned positions and the dot-product math IS the sparse forward (validated by the accuracy contract: bf16-compressed vs bf16-dense ≤ 0.1 max-abs per cell). **Wire-side**: the wire DMA volume stays at the dense total (~110 MB per LSTM call, 's baseline). The accuracy contract is met but the DMA-volume contract is NOT met under the active fork build. Phase 3 picks up the residue: closing requires teaching the BD-emit pass to consume `aie.compress_mm2s` / `aie.decompress_s2mm` and emit the `Enable_Compression = 1` BD word. Until then, 's xclbin compiles cleanly via `Makefile NPU2=1` and runs functionally on silicon — it just doesn't deliver the wire savings. Documented as the partial-fallback verdict in the plan log entry."
