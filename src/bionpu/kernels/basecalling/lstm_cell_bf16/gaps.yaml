    category: "tooling"
    op_or_pattern: "Peano AIE2P clang++ codegen for bf16 LSTM cell with mixed bf16/fp32 stack temporaries"
    attempted: "First-pass kernel held gate_acc[N_GATES][HIDDEN] as fp32 and stored bf16 lane temporaries on the stack via `bfloat16 ga_bf[VEC]; for k... ga_bf[k] = (bfloat16)gate_acc[g][v*VEC+k]; aie::load_v<VEC>(ga_bf);` before the nonlinearity step."
    failed_with: "fatal error: error in backend: immediate operand value -184 is not a multiple of 32 (LLVM AIE2PMCCodeEmitter pass)"
    root_cause: "Peano LLVM AIE2P backend rejects 9-bit signed immediate offsets that aren't 32-byte aligned. The mixed pattern (small bf16 stack arrays interleaved with fp32 static arrays of 96+ elements) appears to drive the register allocator to emit non-32-aligned displacement loads/stores during the nonlinearity-step preamble."
    workaround: "Hold `gate_acc[N_GATES][HIDDEN]` as bf16 throughout (storage type), promote to fp32 transiently inside the inner mac via aie::accum<accfloat,VEC>. Drops the bf16-stack-temporary pattern entirely; the nonlinearity step now reads gate_acc directly with aie::load_v<VEC>. Cleaner code, no precision regression on these magnitudes (bias + gate-sum mantissa fits comfortably in bf16 for Dorado fast weights)."
    upstream_issue: null
    blocks: []
    severity: "workaround"
  - id: ""
    category: "performance"
    op_or_pattern: "bf16 LSTM cell end-to-end max-abs vs FP32 reference on REAL Dorado fast weights (NEGATIVE FINDING)"
    attempted: "Full encoder forward through Dorado fast@v5.0.0 weights (`dna_r10.4.1_e8.2_400bps_fast`) with the bf16 LSTM stack and FP32 conv stems / linear projection. Compared against 's Padé-tanh end-to-end max-abs of 2.303 (the explicit baseline the task brief calls out)."
    failed_with: null
    root_cause: "On synthetic random weights (canary, std=0.05): bf16 5-stack max-abs = 3.74e-3, MUCH better than Padé 2.303. On real Dorado weights (encoder): bf16 end-to-end max-abs = 2.458, slightly WORSE than Padé 2.303 (~7% regression). Investigation: Dorado fast's trained weights have max-abs ~ 1-13 (layer 8 reaches 13.2). The bf16 cast quant noise on these weights is ~8e-3 absolute — multiplied through a 96-tap dot product per output gate, the accumulated error per timestep is sqrt(96) * 8e-3 ~= 8e-2, which compounds linearly across 334 timesteps. The Padé tanh approximation (3e-3 max error per call) ALSO compounds at a similar rate, so the two error sources happen to bracket each other on this specific trained model. Per-cell wins (bf16 cell: 0.232/0.442/0.156/0.325/0.253 vs Padé: 0.327/0.191/0.095/1.051/0.458) are real and uniform per-cell EXCEPT lstm_L2_fwd, where bf16 hits 0.442 vs Padé's 0.191 (2.3× worse on that one layer). Linear projection's [-5, 5] clamp partially saturates the cumulative error in both paths."
    workaround: " ships the bf16 cell anyway: per-cell latency drops 40× (1770 ms FP32 → 45 ms bf16), per-cell max-abs is mostly tighter, and tile-memory drops 2× (51 KiB → 23 KiB) freeing slack for fusion. The end-to-end max-abs regression vs Padé on real weights is documented as a research finding for downstream tasks. Candidates for follow-up: (a) keep lstm_L2 in FP32 (mixed precision), (b) per-channel weight scaling before bf16 cast (AWQ-style), (c) FP16 instead of bf16 (more mantissa, less exponent — better for Dorado fast's ~13 weight max). 's INT8 sweep will use the bf16 baseline this task produces; may find the right operating point is mixed-precision rather than uniform bf16."
    upstream_issue: null
    blocks: []
