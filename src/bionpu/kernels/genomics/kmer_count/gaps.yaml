  - id: "kmer-multi-tile-aggregator-tile-deadcode"
    category: "expressibility"
    op_or_pattern: "kmer_count_aggregator CoreTile fan-in (unused in v0.5)"
    attempted: |
      T6 originally implemented a CoreTile aggregator that received
      partials from N tiles and forwarded a sparse stream to shim
      DMA. T8 IRON Python emit replaced this with the memtile-join
      pattern from `crispr/match_multitile_memtile/multitile_memtile.py`
      because CoreTile has only 2 input DMA channels (AM020 Ch. 2
      p. 27).
    failed_with: |
      The `kmer_count_aggregator.cc` source compiles cleanly but is
      unreferenced by the v0.5 build (kmer_count.py does NOT declare
      a `Kernel("kmer_count_aggregator", ...)` external symbol).
      Dead code, retained for documentation + v1.1 research.
    root_cause: |
      Two-stage CoreTile-then-memtile fan-in would let v1.1 grow
      n_tiles past 4 without exhausting the memtile S2MM budget
      (each CoreTile aggregator absorbs 2 producers; 4 CoreTile
      aggregators feed a memtile of 4 producers = effective n=8
      with budget). The aggregator source is the seed for that work.
    workaround: |
      v1.0 ships with the aggregator source unlinked. v1.1 PRD will
      either:
        (a) Wire the aggregator into a hierarchical fan-in
            topology (each CoreTile aggregator handles 2 producers,
            then memtile.join the aggregators).
        (b) Retire the file once v1.1 silicon-validates the memtile-
            only fan-in for n_tiles=8 via the two-stage path
            described in `kmer-n8-memtile-dma-cap`.
    upstream_issue: null
    blocks: []
    severity: "deferred"
    status: "deferred-to-v1.1"

  - id: "kmer-runner-per-dispatch-overhead"
    category: "performance"
    op_or_pattern: "host_runner per-chunk + per-pass dispatch loop"
    attempted: |
      v1.1 (b) profiling on chr22 (k=21, n_tiles=4, n_passes=4):
      runner subprocess wall = 33.84 s for 12,420 silicon dispatches
      (3105 chunks × 4 passes). Silicon compute ≈ 934 µs/dispatch ×
      12,420 = 11.6 s. Remainder ≈ 22 s is per-dispatch host overhead
      (memset of out BO + sync_to_device + kernel.run + wait +
      sync_from_device + accumulate).
    failed_with: |
      Surfaces as the residual chr22 end-to-end bottleneck after the
      v1.1 (b) Python-parse fix (which itself was a misdiagnosed
      red herring). End-to-end speedup vs Jellyfish 1T = 0.30× —
      unchanged from v1.0; PRD §3.3 e2e gate still not met.
    root_cause: |
      The runner's main loop does ONE silicon kernel.run() per
      (chunk, pass) tuple. At ~1.8 ms wall per dispatch including
      ~934 µs silicon compute + ~870 µs host-side IRON/XRT overhead,
      the host overhead is comparable to the compute itself. With
      12,420 dispatches the overhead dominates.
    workaround: |
      v1.2 candidates:
        (a) Pyxrt in-process path — drops subprocess fork cost (one-
            time ~30 ms; not the dominant share but easy to remove)
            AND lets us pipeline xrt::run::start() + .wait() across
            multiple dispatches.
        (b) Multi-launch batch per dispatch: stage M chunks into one
            larger seq_in BO and have IRON Python iterate over per-
            chunk slot offsets within a single kernel.run(). Reduces
            host-side overhead by factor M.
        (c) Persistent-kernel mode — runner submits N chunks worth
            of seq_in in one streamed BO and the kernel pulls chunks
            from a single ObjectFifo without per-chunk re-launch.
    upstream_issue: null
    blocks:
      - "kmer-prd-3-3-e2e-throughput-gate"
    severity: "performance"
    status: "open"

  - id: "kmer-runner-host-merge-unordered_map"
    category: "performance"
    op_or_pattern: "runner host-side std::unordered_map<uint64,uint64> accumulate"
    attempted: |
      v1.1 (b) profiling: runner accumulate of 42 M emit records into
      30.7 M unique canonical buckets via std::unordered_map. Wall
      attributable to the merge step is ~5-10 s of the 22 s host
      overhead (the rest is per-dispatch XRT submit overhead).
    failed_with: |
      Independent of the per-dispatch fix — even with zero dispatch
      overhead, the post-silicon merge of 42 M canonicals through a
      libstdc++ unordered_map is a 5-10 s host CPU bottleneck.
    root_cause: |
      libstdc++'s unordered_map has a node-per-bucket allocator
      pattern that's cache-hostile at 30 M entries. Each insert is
      ~150-300 ns due to malloc + chain traversal.
    workaround: |
      v1.2 candidates:
        (a) Replace with tsl::robin_map or ankerl::unordered_dense
            (header-only, drop-in API, 3-5× faster on this workload).
        (b) Skip the per-emit hash entirely: collect all 42 M
            canonicals into a flat std::vector, radix-sort by
            canonical, then run-length encode to (canonical, count)
            pairs. O(n) sort time; cache-friendly.
        (c) Per-pass accumulate-then-sort, merging only the
            top-N per pass before global merge.
    upstream_issue: null
    blocks:
      - "kmer-prd-3-3-e2e-throughput-gate"
    severity: "performance"
    status: "open"
