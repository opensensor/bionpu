  - id: ""
    category: "runtime-protocol"
    op_or_pattern: "Direct-stream chunks with zero valid packets"
    attempted: |
      Ran the direct-stream artifact on a deterministic one-valid-window
      fixture: one NGG perfect-match window in chunk 0 and no valid windows
      in the remaining chunks.
    failed_with: |
      Before the sentinel fix, the run returned no records after roughly
      90 s even though host expected 128 hits. A later comparative run
      triggered an amdxdna TDR while still executing the direct-stream
      host_runner:

        aie2_tdr_work: Device isn't making progress... timeout 30
    root_cause: |
      The direct-stream route needs a regular per-chunk stream receive
      protocol. When Tile A emitted no packet words for zero-valid chunks
      and match tiles skipped `get_ss_int()` because the sideband count was
      zero, sparse valid chunks could be lost and the runtime could stop
      making progress.
    workaround: |
      Closed 2026-04-26 by emitting one sentinel packet for empty chunks:
      `window_idx == UINT32_MAX`, spacer words zero, sideband count one.
      Match tiles consume the sentinel normally, and Tile Z skips sentinel
      records before threshold/emit. The focused NPU regression
      `tests/test_pam_filter_pktmerge_npu.py::
      test_direct_stream_npu_one_valid_window_byte_equal_to_host` now
      passes: 128 NPU hits == 128 host hits, ~1.3 ms.
    upstream_issue: null
    status: "closed"
    blocks: []
    severity: "blocker"

  - id: ""
    category: "runtime-protocol"
    op_or_pattern: "Direct-stream artifact repeated host_runner iterations"
    attempted: |
      Ran the serial throughput comparison requested for the direct-stream
      replacement against filter-early using the same synthetic random
      fixture and `n_iters=3, warmup=1`.
    failed_with: |
      The direct-stream host_runner did not return from the first compared
      call and the driver reported a TDR:

        aie2_tdr_work: Device isn't making progress... timeout 30
        Dumping ctx ctx.89013.1
        fence: unsignaled
        out_fence: unsignaled

      The process was:

        crispr_pam_filter_pktmerge_direct_stream/host_runner
        --iters 3 --warmup 1
    root_cause: |
      The direct-stream workers were created with `while_true=False`, so the
      first host_runner iteration could complete but the worker cores did not
      persist for later runtime launches in the same loaded context. The
      default CRISPR programs use persistent workers, which is why their
      host_runner iteration loop is reusable.
    workaround: |
      Closed 2026-04-26 by removing `while_true=False` from the direct-stream
      Tile A, match-tile, and Tile Z workers. The rebuilt direct-stream xclbin
      passes the original repro with `n_iters=3, warmup=1`:

        * random fixture: 0 NPU hits == 0 host hits, avg ~832 us;
        * serial compare vs filter-early: direct ~827 us, early ~752 us,
          byte-equal, ratio early/direct ~0.91x;
        * one-valid-window-per-chunk compare: direct ~516 us, early ~748 us,
          byte-equal, ratio early/direct ~1.45x.
    upstream_issue: null
