  - id: ""
    category: "expressibility"
    op_or_pattern: "PacketFifo integration with iron.Program.resolve_program() tile-collection walk"
    attempted: |
       attempted to wire the variable-rate PacketFifo edge directly
      into the live IRON Program (Tile A → match tiles via pktMerge in
      fabric, with a 1-bit valid header gating the merge). The fork's
       PacketFifo lands the API surface + packetflow lowering
      correctly (`tests/test_iron_packet_fifo.py` all green) — the
      class accepts the canonical filter-early construction with
      `header_dtype="uint8"`, `merge_strategy="round-robin"`,
      `keep_pkt_header=False` (finish-on-TLAST). Constructed the
      topology, wired Worker.fn_args with PacketFifoHandle returned
      from `pf.prod(0)` / `pf.cons(i)`, and called
      `Program(dev, rt).resolve_program()`.
    failed_with: |
      AttributeError: 'Tile' object has no attribute 'tile'
      File "iron/program.py", line 81 in device_body:
        all_tiles.extend([e.tile for e in f.all_of_endpoints()])
    root_cause: |
      `iron/program.py`'s tile-collection walk does
      `[e.tile for e in fifo.all_of_endpoints()]` expecting
      endpoint-typed objects (each carrying a `.tile` attribute), but
      `PacketFifoHandle.all_of_endpoints()` returns Tile objects
      directly (per the fork's `python/iron/packet.py` line 813-822).
      ObjectFifo wraps producers/consumers in
      `ObjectFifoEndpoint` objects which DO carry `.tile`; PacketFifo
      treats producers/consumers as Tiles directly because the
      packetflow lowering is per-(producer-tile, consumer-tile)
      routing entry, not per-endpoint-pair like ObjectFifo's shared-
      memory + lock model. Closing this requires either:
        (a) modifying the fork's `iron/program.py` to special-case
            Tile-typed endpoints (or wrap them at collection time);
        (b) modifying the fork's `iron/packet.py` to wrap the Tile
            list in synthetic endpoint objects with `.tile`;
        (c) a deeper refactor unifying the endpoint shape across
            ObjectFifo / PacketFifo / CascadeFifo / AccumFifo.
      All three are upstream lifts beyond 's "OUTER REPO ONLY"
      scope per the Phase 2 plan entry.
    workaround: |
      The retrofit ships in two layers:
        1. **Live IRON Program** (`pam_filter_pktmerge.py`'s
           `crispr_pam_filter_pktmerge` function): the byte-equal
           twin of filter-early. Uses the same ObjectFifo
           wiring uses; produces a buildable xclbin that runs
           on AIE2P silicon (verified — `test_dispatch_smoke_pktmerge`
           PASS, ~6.14 s per 4096-window launch). Output is byte-
           identical to 's filter-early + filter-late on the
           same input by construction (same arithmetic, same chunk
           geometry).
        2. **PacketFifo topology declaration** (`pktmerge_topology()`
           helper): the canonical topology constructed at
           API-surface level. Ratifies that the fork's 
           PacketFifo class accepts the canonical filter-early
           construction. Documents the silicon-level wiring target;
            tracks replacing the ObjectFifo data path.

      Throughput verdict (recorded in
      `results/crispr/c-m5-pktmerge/measurements.json`): the live-
      program ratio vs filter-early is ~1.00× (same xclbin
      arithmetic; pktMerge fabric filtering not in effect on the
      live path). The cross-walk's predicted ~7/8 reduction stays
      a falsifiable claim — testable once replaces the
      ObjectFifo `windows_out` edge with a packetized stream path.
      Honest-deviation reporting per Phase 2 plan: predicted vs
      actual + verdict + root cause.

      **CLOSED 2026-04-26**: fork-side PacketFifo resolve now uses the
      live Worker endpoint tiles recorded on `PacketFifoHandle`, not
      the constructor Tile objects. `tests/test_iron_packet_fifo.py::
      test_packet_fifo_resolve_emits_packet_flow` covers the minimal
      resolve case. The CRISPR live generator no longer emits PacketFifo
      as a sidecar because that was proven to be the wrong integration
      shape; see .
    upstream_issue: null
    status: "closed"
    closed_by_fork_branch: "feature/-fifohandle-fix"
    closed_by_fork_commit: "local follow-up: PacketFifo.resolve live endpoint tiles"
    blocks: []
    severity: "workaround"

  - id: ""
    category: "resource-conflict"
    op_or_pattern: "PacketFifo packetflow sidecar coexisting with ObjectFifo byte-equal data path"
    attempted: |
      Enabled the retired `BIONPU_T33_LIVE_PACKETFLOW=1` path and rebuilt
      the CRISPR pktmerge artifact with `make NPU2=1 all`. The generator
      resolved and emitted packetflow MLIR, proving was no
      longer the blocker, but the packetflow was only a sidecar.
    failed_with: |
      aiecc routing failure:

        'aie.connect' op ; connecting (South: 3) to (DMA: 0) on
        TileID(0, 3) targets same dst as another connect op; existing
        destinations: (North: 5), (DMA: 0)

      The failing MLIR has both the byte-equal ObjectFifo route and the
      opt-in PacketFifo route live at once.
    root_cause: |
      The current pktmerge live program still moves `windows_out`
      through ObjectFifo so the existing C++ match kernels can consume
      memrefs. Adding PacketFifo as a sidecar packetflow consumes the
      same limited match-tile stream/DMA destinations already occupied
      by ObjectFifo routes for guides/windows. On the two-match-tile
      topology there is no spare destination channel for a sidecar
      PacketFifo without changing the real data path.

      Follow-up correction (2026-04-26): the valid/drop header model was
      also wrong for the current fork. PacketFifo packet IDs are assigned
      per producer by the packetflow lowering, not per packet. Therefore
      CRISPR cannot emit invalid windows with PACKET_ID_INVALID and rely
      on fabric-side drop. The implementable replacement contract is:
      Tile A emits only PAM-passing windows, and each valid packet carries
      original window_idx + spacer bytes so sparse output coordinates stay
      stable after variable-rate compaction.
    workaround: |
      Remove the sidecar from the live CRISPR generator. Keep PacketFifo
      coverage in the fork-level minimal tests and keep
      `pktmerge_topology()` as a topology/API declaration. The replacement
      path is now `DIRECT_STREAM=1`: it removes the fixed-rate `windows_out`
      payload path, emits explicit core-to-core stream routes, and uses
      packetized stream kernel symbols instead of threading an unused
      PacketFifo handle beside ObjectFifo traffic. The corrected ABI is
      encoded in `pktmerge_replacement_contract()` and
      `tests/test_pam_filter_pktmerge_npu.py::
      test_pktmerge_replacement_contract_skips_invalid_windows`.

      **CLOSED 2026-04-26**: the live sidecar packetflow path is retired.
      `tests/test_pam_filter_pktmerge_npu.py::
      test_generator_does_not_emit_sidecar_packetflow` guards against
      reintroducing it. Remaining work is not "make the sidecar route";
      it is "promote and time the replacement stream data path".
    upstream_issue: null
    status: "closed"
    blocks: []
    severity: "blocker"

  - id: ""
    category: "backend-lowering"
    op_or_pattern: "Pure MLIR aie.put_stream / aie.get_stream packet loops"
    attempted: |
      Re-authored the CRISPR packetized replacement path to bypass ADF C++
      stream pointers and lower packet transfers directly to MLIR
      `aie.put_stream` / `aie.get_stream`. Tested i32, i64, and i128 stream
      word forms on AIE2P.
    failed_with: |
      The i32 form verifies only when stream ops are emitted directly under
      `aie.core`, which forced full unrolling of the per-packet transfer
      loops. The 4096-window direct-stream program generated about 153k
      lines of MLIR, 12,288 `aie.put_stream` ops, and 24,576
      `aie.get_stream` ops.

      The i64 form fails verifier:

        'aie.put_stream' op operand #1 must be 32-bit float or 32-bit
        signless integer or 128-bit signless integer, but got 'i64'

      The i128 form verifies and routes, but full AIE2P lowering fails
      because the backend tries to call wide stream intrinsics that are not
      declared in this Peano/LLVM-AIE stack:

        llvm.aie2p.put.wms
        llvm.aie2p.get.wss
    root_cause: |
      The AIE dialect stream ops are not a good loop-level abstraction in
      this stack. The legal 32-bit form lowers to available AIE2P backend
      intrinsics (`llvm.aie2p.put.ms` / `llvm.aie2p.get.ss`) but forces
      in-core unrolling when emitted from Python MLIR construction. The
      wider forms either are illegal (`i64`) or reach missing AIE2P wide
      intrinsic declarations (`i128`).
    workaround: |
      Move the per-packet stream loops into Peano C++ and keep IRON/MLIR
      responsible only for compact chunk loops plus explicit core stream
      routes. `tile_a_pktmerge.cc` now uses `<aie2p/aie2p_streams.h>` and
      the 32-bit AIE2P intrinsics directly:

        crispr_pam_filter_tile_a_pktmerge_stream_i32
        crispr_match_multitile_match_packetized_stream_i32

      This avoids `<adf.h>`, `input_stream<>`, `output_stream<>`,
      `readincr`, and `writeincr`. `DIRECT_STREAM=1` now emits a 166-line
      `build/aie.mlir` with zero `aie.put_stream` and zero `aie.get_stream`
      ops, verifies with `aie-opt --verify-diagnostics`, routes with
      pathfinder, and builds `build/final.xclbin` successfully.
    upstream_issue: null
    status: "closed"
    blocks: []
    severity: "workaround"

