# ships four kernel directories (conv_stem_layers_2_3, lstm_cell,
# lstm_stack, linear_projection). The aggregator de-duplicates by
# task_id (one gaps.yaml per task), and walks `bionpu/kernels/`
# alphabetically. So this file (under conv_stem_layers_2_3 — first
# alphabetically) carries the consolidated gap list. The other
# three directories ship empty `gaps: []` files for "reported clean"
# semantics so their kernels are visible to the aggregator.
