  - id: ""
    category: "runtime-protocol"
    op_or_pattern: "Direct-stream single Core:0 fanout under dense valid-window traffic"
    attempted: |
      Ran a direct-stream benchmark matrix to separate sentinel-only overhead,
      valid-window stream/match traffic, and sparse emit traffic. Each case
      used the vendored `crispr_pam_filter_pktmerge_direct_stream` artifact
      against filter-early with `n_iters=3, warmup=1`.

      Completed rows:

        * nohit, 0 valid/chunk: direct ~292 us, early ~687 us,
          ratio early/direct ~2.35x, byte-equal;
        * nohit, 1 valid/chunk: direct ~326 us, early ~670 us,
          ratio early/direct ~2.06x, byte-equal;
        * nohit, 4 valid/chunk: direct ~769 us, early ~690 us,
          ratio early/direct ~0.90x, byte-equal.

      The next denser nohit row (`16 valid/chunk`) TDR'd.
    failed_with: |
      amdxdna TDR while executing the direct-stream host_runner:

        aie2_tdr_work: Device isn't making progress... timeout 30
        Dumping ctx ctx.92621.1
        JOB[0] fence: unsignaled
        JOB[0] out_fence: unsignaled

      The Python wrapper then raised `subprocess.TimeoutExpired` for the
      direct-stream host_runner after 120 seconds.
    root_cause: |
      Open. The single Tile-A `put_ms` stream is routed as a Core:0 fanout to
      both match tiles. That route is correct and fast for sentinel-only and
      extremely sparse traffic, but it becomes slower around four valid
      windows per 64-window chunk and stalls/TDRs at denser traffic.

      The current Peano AIE2P C++ stream helper exposes `put_ms` /
      `get_ss_int` only for the single master/slave stream; it does not expose
      a stream-port argument that would let Tile A duplicate packet words onto
      two independent explicit streams. Therefore the obvious "replace fanout
      with two independent streams" experiment is blocked at this ABI layer.
    workaround: |
      Treat the current direct-stream path as a sparse-PAM candidate only. Do
      not promote it as the default CRISPR path until dense valid-window
      traffic is handled.

      Follow-up implemented 2026-04-26: `COMPACT_PACKETS=1` replaces the
      direct stream fanout with a counted compact-packet ObjectFifo and
      registers the separate `crispr_pam_filter_pktmerge_compact_packets`
      artifact. The first version used `memref<97xi64>` and three logical
      words per valid window. A second ABI pass moved the local window index
      into the high byte of the second spacer word, shrinking the packet FIFO
      to `memref<65xi64>` and compact partials to 65 bytes/record without
      adding a Tile A output FIFO. This path passes build, verify, route, and
      live-NPU canaries. In the no-hit density matrix it remains byte-equal
      and does not TDR at 16 valid/chunk:

        * 0 valid/chunk: compact ~171 us, early ~724 us,
          ratio early/compact ~4.25x;
        * 1 valid/chunk: compact ~240 us, early ~680 us,
          ratio early/compact ~2.84x;
        * 4 valid/chunk: compact ~704 us, early ~683 us,
          ratio early/compact ~0.97x;
        * 16 valid/chunk: compact ~2553 us, early ~1857 us,
          ratio early/compact ~0.73x.

      This is the better robust route, but not yet a default-promotion result:
      sparse chunks speed up, dense PAM-pass chunks remain slower than
      filter-early.

      Remaining candidate experiments:

        * use packet headers / packet-switched routes if the backend supports
          explicit destination IDs from Peano C++;
        * reduce dense-valid per-record work in the compact match/emit path;
        * split the work into two Tile-A producer phases/artifacts, one per
          match tile, if the toolchain can expose separate master streams.
    upstream_issue: null
    status: "open"
    blocks:
