  - id: ""
    category: "expressibility"
    op_or_pattern: "AccumFifoHandle.all_of_endpoints — fork primitive ships without Program.resolve_program-compatible endpoint discovery"
    attempted: |
       attempted to lower a 5-tile cascade-stream LSTM stack via
      the fork's first-class IRON primitive aie.iron.AccumFifo.
      Program.resolve_program walks every fifo handle in worker.fn_args
      and calls handle.all_of_endpoints() to populate the device's
      tile-resolution set. AccumFifoHandle inherits all_of_endpoints()
      from ObjectFifoHandle but does not set self._object_fifo (it
      bypasses ObjectFifoHandle.__init__ to avoid the memref-typed
      constraints), so the inherited implementation raises
      AttributeError: 'AccumFifoHandle' object has no attribute
      '_object_fifo'.
    failed_with: |
      Stack trace at silicon-test build attempt (2026-04-25):
        File "aie/iron/program.py", line 81, in device_body
          all_tiles.extend([e.tile for e in f.all_of_endpoints()])
        File "aie/iron/dataflow/objectfifo.py", line 479, in all_of_endpoints
          return self._object_fifo._get_endpoint(...)
      AttributeError: 'AccumFifoHandle' object has no attribute '_object_fifo'
    root_cause: |
      Fork-side incomplete primitive integration. AccumFifoHandle's
      override-and-bypass pattern was correct for the acquire/release
      semantics (cascade has no ObjectFifo depth/dims), but did not
      account for Program.resolve_program's downstream introspection.
      A fix requires either (a) AccumFifoHandle.__init__ sets
      self._object_fifo to a compatible shim object exposing
      _get_endpoint, OR (b) AccumFifoHandle overrides all_of_endpoints
      to return [ObjectFifoEndpoint(tile)] directly. Both paths are
      ~20 LoC fork edits.
    workaround: |
      Outer-repo monkey-patch in 's IRON Python topology:
      bind a per-handle all_of_endpoints lambda that returns
      [ObjectFifoEndpoint(prod_tile), ObjectFifoEndpoint(cons_tile)]
      for each AccumFifo's prod() and cons() handles. Implemented at
      bionpu/kernels/basecalling/lstm_cell_bf16_acc_cascade/
      lstm_cell_bf16_acc_cascade.py. Validated end-to-end: MLIR
      emits cleanly with correct aie.cascade_flow ops between tiles.

      **CLOSED 2026-04-25 (pending orchestrator wheel rebuild)**: fork
      PR ``feature/-fifohandle-fix`` lands the upstream fix
      (AccumFifoHandle now overrides ``all_of_endpoints()`` to return
      endpoint-typed objects directly so ``Program.resolve_program``'s
      tile-collection walk no longer trips on the missing
      ``_object_fifo`` field). The outer-repo monkey-patch in
      ``lstm_cell_bf16_acc_cascade.py`` has been removed in the same
      commit cycle. Status flips to ``closed`` once the orchestrator
      rebuilds the wheel and the bumped submodule lands on outer-repo
      main; 's outer-repo tests then re-run cleanly without the
      workaround. See fork commit on
      ``feature/-fifohandle-fix`` for the upstream fix.
    upstream_issue: null
    status: "closed-pending-orchestrator-wheel-rebuild"
    closed_by_fork_branch: "feature/-fifohandle-fix"
    closed_by_fork_commit: "9446d21ed8bf0be32bf925728138b4333f24763d"
    blocks: []
    severity: "workaround"

  - id: ""
    category: "device_geometry"
    op_or_pattern: "5-tile vertical cascade chain on AIE2P (DESIGN.md original 5-deep column)"
    attempted: |
      's DESIGN.md specified 5 vertically-adjacent CoreTiles in
      column 0, rows 2..6, for the 5-layer Bonito LSTM stack. On AIE2P
      (Strix, NPU2 device class) aie.iron.device.NPU2 reports
      rows = 6 (indices 0..5), with row 0 = ShimTile, row 1 = MemTile,
      and rows 2..5 = CoreTiles. A column has only **4 CoreTiles**,
      not 5. The original DESIGN.md was derived from AM020 Ch. 1 p. 6
      which describes a generic AIE-ML 6-row layout including a 5th
      CoreTile row that AIE2P / NPU2 does not surface in its
      target-model rows() override.
    failed_with: |
      ValueError: Coordinates (0, 6) are out of range for device
      (8 cols x 6 rows)
    root_cause: |
      AIE2P device geometry: row 6 does not exist on Strix; the
      device has only 4 CoreTile rows per column (rows 2..5 inclusive).
      DESIGN.md's 5-row vertical chain assumed the 5-row AIE-ML layout.
    workaround: |
      Pivot to a 4+1 column-spanning layout: 4 CoreTiles in column 0
      (rows 5,4,3,2 — chain runs upward to satisfy the cascade-flow
      "source must be South-of OR West-of destination" direction
      constraint enforced by AIELowerCascadeFlows.cpp:63), plus a
      horizontal hop into column 1 row 2 for layer 4. AccumFifo
      raises a UserWarning that horizontal cascade was not measured
      in T7-IRON's investigation, but AM020 Appendix A p. 80 Figure
      45 confirms it is supported. 's lstm_cell_bf16_acc_cascade.py
      uses this 4+1 layout. **MLIR emits cleanly + aiecc lowers
      successfully** through to a working xclbin.
    upstream_issue: null
    blocks: []
    severity: "workaround"

  - id: ""
    category: "abi"
    op_or_pattern: "AIE2P kernel ABI buffer-slot cap (5 bo* slots) limits multi-tile xclbin per-tile dataflow"
    attempted: |
      's 5-layer cascade design needs **7 host-visible buffers**
      per kernel invocation: 1 input (to layer 0's row), 5 separate
      per-layer weight buffers, and 1 output (from layer 4's row).
      The IRON Python topology emits 7 ObjectFifos in the runtime
      sequence; aiecc lowers them all to valid aie.dma_configure_task_for
      ops in the runtime sequence body (verified in
      build/aie_L334.mlir.prj/input_with_addresses.mlir).

      The lowered xclbin's ps-kernel JSON, however, exposes only
      **5 buffer slots** (bo0..bo4) plus opcode + instr + ninstr.
      The host's xrt::kernel(opcode, bo_instr, ninstr, *bos) ABI
      saturates at 5 user-supplied BOs per call. Passing 7 BOs hits a
      vector-out-of-range exception inside the host runner / XRT
      kernel-call expansion.
    failed_with: |
      terminate called after throwing an instance of 'std::out_of_range'
        what():  vector::_M_range_check: __n (which is 8) >= this->size() (which is 8)
    root_cause: |
      AIE2P's NPU programmable-launch ABI hardcodes 5 buffer-object
      slots per kernel call (matches the C++ xrt_test_wrapper.h
      convention of `(opcode, bo_instr, ninstr, in1, in2, out, ctrl,
      trace)` = 5 user BOs). Multi-tile xclbins that need more than
      5 host-visible per-tile buffers must either (a) consolidate
      multiple per-tile streams through memtile splits / fans-out
      (so the host sees one shim DMA instead of N), or (b) accept
      a smaller per-tile count.

      The Phase 1 cross-walk did not flag this constraint. Bonito's
      5-layer LSTM stack with separate per-layer weight DMAs maps to
      7 host buffers (1 in + 5 wb + 1 out), one over the 5-slot cap.
    workaround: |
      Two paths forward, neither adopted in :

      (1) **Consolidated weight DMA** — concatenate all 5 layers'
          weights into a single host buffer; route through one shim
          DMA → memtile split → 5 per-cell ObjectFifos via
          object_fifo_link's split-by-offset pattern (the upstream
          ``programming_examples/basic/matrix_multiplication/cascade/``
          pattern). Reduces host BO count from 7 to 3. Estimated
          1-2 days additional engineering for the IRON-side split
          topology + matching host runner reshape.

      (2) **3-tile cascade test** — drop two Bonito layers and run
          the cross-walk silicon test on a 3-tile cascade (input + 3
          wb + output = 5 BOs, fits the cap exactly). Tests the
          cascade-FP32-handoff mechanism but with a 3-layer stack
          instead of Bonito's 5-layer. The cross-walk's hypothesis
          ("cascade FP32 handoff recovers precision") is testable at
          either depth; the absolute max-abs threshold (< 0.23) is
          not meaningful at 3-layer depth without a matching 3-layer
           baseline.

       ships with the build infrastructure (kernels, IRON
      topology, host runner, Makefile) **complete + verified through
      the xclbin build**, but the silicon-level encoder
      max-abs measurement is **deferred** to a follow-up that picks
      either workaround. measurements.json records verdict:
      "deferred_silicon_build" with this gap as the diagnosis.

      **CLOSED 2026-04-25 (T1 swarm task) — path (1) consolidated
      weight DMA implemented**. ``lstm_cell_bf16_acc_cascade.py``
      now uses a single shim → memtile ObjectFifo
      (``weight_in_all``, parent frame = N_LAYERS chunks
      back-to-back) with ``of_weights_consolidated.cons().split(
      per_layer_chunk_offsets, ...)`` fanning out at the memtile
      to 5 per-cell sub-fifos. Lowered MLIR runtime_sequence
      shows exactly 3 host BOs:
      ``aie.runtime_sequence(memref<32064xbf16>,
      memref<143646720xbf16>, memref<32064xbf16>)`` (input,
      consolidated weights, output). The
      ``aie.objectfifo.link [@weight_in_all] -> [@weight_in_L0..L4]
      ([] [0, 5376, 10752, 16128, 21504])`` op is preserved
      end-to-end through the lowering. Single silicon dispatch
      under the swarm NPU mutex submitted the 3-BO host call
      cleanly — **no ``std::out_of_range`` exception**, the original
       ABI blocker is gone. New silicon-side firmware
      timeout surfaced (the multi-tile cascade kernel itself wedges
      the firmware after host call returns) — filed as 
      below; that is **distinct from 's host-arg-slot
      ABI scope**. See
      ``state/swarm/t1/silicon-ratification-summary-{iso8601}.json``
      for the full run evidence.
    upstream_issue: null
    status: "closed"
    closure_ref:
      fork_repo: "https://github.com/opensensor/mlir-aie"
      fork_branch: "feature/-split-fifo-attr-propagation"
      fork_commit: "930e23c7825a8e45b99e99c31d816e52d2f03ea2"
      summary: |
        Consolidated weight DMA via memtile-split-by-offset implemented
        on the bionpu side using the existing IRON
        ``ObjectFifoHandle.split`` API (no fork edit required). Drops
        host BO count from 7 to 3, fitting the AIE2P 5-slot kernel-arg
        ABI cap. Silicon dispatch confirms the host call succeeds with
        no ABI exception. New firmware-timeout issue surfaced (the
        multi-tile cascade kernel itself wedges the firmware after the
        host call returns) — distinct gap, filed as .
        Evidence: ``state/swarm/t1/build-verification-{iso8601}.json``
        + ``state/swarm/t1/silicon-ratification-summary-{iso8601}.json``
        + ``state/swarm/t1/lowered-L334-input_with_addresses.mlir``.
