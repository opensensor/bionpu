  - id: "B2-peano-libcxx-build-blocker"
    category: "toolchain"
    op_or_pattern: "Peano libcxx headers missing post-Followup-I rebuild"
    attempted: |
      B2 silicon-validate of dorado_fast_linear_projection_fused_perts.
      Tried full xclbin build via:
        make NPU2=1 experiment=fused-perts seq=334 all
      after sourcing /opt/xilinx/xrt/setup.sh + ironenv venv +
      MLIR_AIE_DIR + PEANO_INSTALL_DIR.
    failed_with: |
      Peano clang++ for aie2p-none-unknown-elf target cannot find
      libcxx headers:
        stdlib.h file not found  (initial)
        algorithm file not found (after dropping unused stdlib.h —
                                  aie_api/aie.hpp pulls <algorithm>)
        __config_site file not found  (after -isystem libcxx/include —
                                       __config_site is the .in template,
                                       not generated)
      Affects ALL kernels that include <aie_api/aie.hpp>, NOT just the
      new fused-perts artifact. The existing per-group
      linear_projection.cc and the LSTM lstm_cell_bf16_acc.cc both
      reproduce the same error in the same env.
    root_cause: |
      Followup-I (AIE2P sparse-load intrinsics) rebuilt
      third_party/llvm-aie/build without re-running the libcxx install
      step. Last known-good kernel .o build is from 2026-04-27T02:55Z
      (lstm_cell_bf16_acc.o); the rebuild dropped libcxx after that.
      libcxx source is present at libcxx/include/ but __config_site is
      the unprocessed .in template.
    workaround: |
      Two paths:

      (1) Rebuild llvm-aie with libcxx install step:
          cmake -DLLVM_ENABLE_RUNTIMES="cxx;cxxabi" ... && cmake --build
          . --target cxx cxxabi install
          (canonical fix; restores all kernel-rebuild capability).

      (2) For B2 specifically without rebuild: silicon-validate by
          running the EXISTING per-group xclbin (cached at
          bionpu/dispatch/_npu_artifacts/dorado_fast_linear_projection/
          final.xclbin) and the new fused-perts artifact ONCE the
          rebuild lands. Cached xclbins are unaffected by this
          regression — only fresh .cc compiles are blocked.

      Diagnostic state captured at
      state/b2-peano-libcxx-blocker-20260428T011043Z/b2-blocker.json.

      NPU silicon itself is healthy: xrt-smi examine shows
      NPU Strix [0000:67:00.1] aie2p 6x8, fw 1.1.2.64,
      /dev/accel/accel0 present crw-rw-rw-+. Pure toolchain-side
      blocker.
    upstream_issue: null
    blocks:
      - "B1-fused-perts-stage3 (silicon validation)"
    severity: "blocker"
    status: "open"

  - id: "B1-fused-perts-stage3"
    category: "performance"
    op_or_pattern: "linear_projection per-timestep call fusion (DESIGN-fusion.md stage 3)"
