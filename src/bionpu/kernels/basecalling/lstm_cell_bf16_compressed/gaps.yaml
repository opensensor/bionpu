    status: "closed"
    closure_ref:
      fork_repo: "https://github.com/opensensor/mlir-aie"
      fork_branch: "feature/-split-fifo-attr-propagation"
      fork_commit: "930e23c7"
      summary: |
        Closed via Option (1) "Fork patch" path on the same day
        as filing. Two-part fix on
        feature/-split-fifo-attr-propagation (commit
        930e23c7, branched off main at 73e48b0a):

        Part 1 — split-fifo attr propagation
        (AIEObjectFifoStatefulTransform.cpp:~1976): copy the
        SparseFifo discardable attrs (aie.compress_mm2s,
        aie.decompress_s2mm, aie.sparsity_pattern, aie.sparsity_n,
