    upstream_issue: null
    blocks: []
    severity: "performance"
    status: "open"

  - id: "B1-fused-dispatch-stage4"
    category: "performance"
    op_or_pattern: "linear_projection single-call-per-dispatch (DESIGN-fusion.md stage 4)"
    attempted: |
      Stage-4 fused-dispatch artifact: distinct kernel symbol
      (dorado_fast_linear_projection_fused_dispatch), distinct
      artifact directory, inner-loop micro-opt (aie::reduce_add for
      the per-OC scalar reduction tail vs stage 3's manual scalar
      sum), wire format identical to stage 3 (bf16 input + bf16
      weight slab + bf16 output). Implementation lands as:
        - linear_projection_fused_dispatch.py (IRON, depth=1 weight
          ObjectFifo; same SCF-loop shape as stage 3 — see fallback
          rationale below)
        - linear_projection_fused_dispatch.cc (per-call inner OC-group
          loop with aie::reduce_add tail)
        - runner_fused.cpp reused (wire format identical to stage 3)
        - DoradoFastLinearProjectionFusedDispatch in __init__.py
        - Makefile experiment=fused-dispatch target
        - tests/test_linear_projection_fused_dispatch_correctness.py
    failed_with: |
      The literal stage-4 spec ("kernel takes ObjectFifo handles +
      count L and walks the fifos internally for all L timesteps,
      one func.call per dispatch") is NOT expressible at the current
      IRON-Python layer:

        * aie.iron.Kernel only accepts arg types of (numpy ndarray /
          numpy dtype / scalar); see python/iron/kernel.py BaseKernel
          and ExternalFunction signatures. There is no
          objectfifo-handle ABI exposed to peano-compiled C++ kernels.
        * aie.objectfifo.acquire / release are MLIR-level ops emitted
          by the AIEObjectFifoStatefulTransform pass from scf.for-
          driven IRON Python. They are not exposed as C-callable
          intrinsics in the AIE2P sysroot
          (/home/matteius/xdna-bringup/ironenv/lib/python3.14/
           site-packages/llvm-aie/include/aie2p-none-unknown-elf/).
        * Acquiring the FULL L*HIDDEN input + L*OUT_DIM output as
          single big ObjectFifo elements (so a single kernel call
          could walk them in C++) is blocked by tile DM size: the
          AIE2P CoreTile localMemory is 0x10000 = 64 KiB, weight
          alone takes 48 KiB, full input is ~62.6 KiB and full
          output is ~167 KiB — output alone overflows.

      Per the prompt's done-criteria escape hatch, fall back to the
      "Python-loop-with-runtime-SCF approach (which collapses stage
      4 to stage 3's shape)". The MLIR shape is byte-equivalent to
      stage 3 — one scf.for over L=334 with one func.call per
      iteration, one acquire/release pair per timestep on
      input/output, weight acquired once per dispatch.
    root_cause: |
      IRON Python's Kernel/ExternalFunction ABI is fundamentally
      pointer-and-scalar typed; there is no objectfifo-handle type
      in the supported arg_types list. The stage-4 spec assumes a
      capability the Python frontend does not (yet) expose. A future
      IRON extension that adds an "ObjectFifoHandle" arg type +
      lowers C-callable acquire/release intrinsics would unblock the
      literal stage-4 shape.
    workaround: |
      Implemented as documented fallback. What stage 4 still
      delivers vs stage 3:

        - Distinct entry symbol
          (dorado_fast_linear_projection_fused_dispatch) and
          artifact path, allowing the dispatch registry to A/B
          between stage 3 and stage 4 cleanly.
        - Inner-loop micro-opt: per-OC reduction tail uses
          aie::reduce_add instead of a scalar-sum-on-loaded-vector.
          On AIE2P this is a single cross-lane reduction tree; the
          stage-3 manual scalar loop emits 16 sequential f32 adds
          per OC * 256 OCs * 334 timesteps.

      Realistic stage-4 ceiling: marginal improvement over stage 3's
      9.68 ms/iter (silicon-validated 2026-04-28). Possibly
      indistinguishable from stage 3 within run-to-run variance —
      the DESIGN-fusion.md "few ms" prediction over-attributed
      savings to the call-count collapse, but stage 3 already showed
      that per-call setup overhead in-tile is much smaller than the
      author's 422 us model. Silicon validation is a separate
      follow-up that will reuse state/b2-silicon-validation.py as a
      template (just instantiate the new op class).

      Build-clean status: the IRON Python lowers without errors via
      `make experiment=fused-dispatch NPU2=1 seq=334
      build/aie_fused_dispatch_L334.mlir`. The C++ kernel compiles
      to .o under the ironenv-bundled peano (per
      B2-peano-libcxx-build-blocker, the ironenv peano is canonical;
      the third_party/llvm-aie/build peano is still missing libcxx).
    upstream_issue: null
    blocks: []
    severity: "performance"
    status: "open"

