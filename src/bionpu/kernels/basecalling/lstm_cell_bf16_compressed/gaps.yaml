        test/objectFifo-stateful-transform/sparse_fifo_split_attr_propagation.mlir
        drives ``aie-objectFifo-stateful-transform`` end-to-end on
        a SparseFifo-decorated ObjectFifo with cross-column tiles
        + via_DMA=true; CHECKs both producer-side MM2S and
        consumer-side S2MM BDs carry aie.enable_compression=true.
        The original final-hop lit test
        (test/Conversion/DmaToNpu/dma_to_npu_sparse_compression.mlir)
        is unchanged and still passes (regression-protected).

        **End-to-end build verified** via bionpu outer repo
        tests/aie2p_microtests/dma_compression_loopback/. Pre-fix
        evidence:
        state/g-t3.2-006-bd-emit-asymmetry/input_with_addresses-20260425T221658Z.mlir
        (consumer-side BDs missing the attr). Post-fix evidence:
        state/g-t3.2-006-bd-emit-asymmetry/post-fix/input_with_addresses-20260425T222836Z.mlir
