  - id: "A-pyxrt-in-process-dispatch"
    category: "host_dispatch"
    op_or_pattern: "Replace subprocess host_runner with in-process pyxrt for both linear_projection variants"
    attempted: |
      Added BIONPU_LINEAR_PROJECTION_DISPATCH={subprocess,pyxrt} env
      var (also accepted as DoradoFastLinearProjection{,FusedPerts}
      __call__(_impl=...)) routing both ops through
      bionpu.dispatch.npu.NpuBackend.run_xclbin (in-process pyxrt).
      Subprocess path stays as default fallback for envs without
      /opt/xilinx/xrt/python on PYTHONPATH.

      Kernel arg layout reused from runner.cpp / runner_fused.cpp:
        arg3=input, arg4=weight, arg5=output, arg6=trace.
      Both runners use the same layout; only buffer dtype + size
      differ (FP32 per_group, bf16 fused_perts).
    failed_with: null
    root_cause: |
      Per b-m7 bench, fused_perts kernel time was ~9.7 ms but
      end-to-end wall was ~112 ms — ~100 ms/dispatch was
      subprocess fork + xrt::device::register_xclbin + hw_context
      construction ceremony, repeated per chunk. pyxrt path caches
      the device + xclbin + kernel handles in a process-level
      NpuBackend singleton, so only the BO alloc + kernel launch
      cost remains per dispatch.
    workaround: |
      Silicon-validated A_PYXRT_PASS at
      results/basecalling/b-m8-pyxrt/measurements.json
      (state/a-pyxrt-validation-20260428T020716Z.json):
        per_group / subprocess wall   987.3 ms
        per_group / pyxrt wall        882.1 ms   (1.12x; kernel-dominated)
        fused_perts / subprocess wall 160.8 ms
        fused_perts / pyxrt wall       26.8 ms   (6.0x)
        fused_perts / pyxrt 16-iter steady-state wall/iter 10.9 us
            (kernel avg 9.65 ms; ~1.25 ms host overhead per iter)
        pyxrt vs subprocess output: byte-equal (max-abs-diff 0.0) for both.
      The 16-iter steady-state number is the encoder-style realistic
      win: a single pyxrt session amortises the xclbin load + BO
      group-id lookup, so per-chunk wall collapses from 112 ms (b-m7)
      to ~10.9 ms — closing the gap to silicon-bound throughput.
    upstream_issue: null
    blocks: []
    severity: "performance"
    status: "validated"

  - id: "B-m12-long-shape-L1667"
    category: "shape_coverage"
    op_or_pattern: "Production-shape (long) artifacts for DoradoFastLinearProjection{,FusedPerts} paired with the LSTM L=1667 path"
    attempted: |
      Built the L1667 sibling artifacts via the existing Makefile:
        make NPU2=1 experiment=production seq=1667 all
        make NPU2=1 experiment=fused-perts seq=1667 all
      Installed at
        bionpu/dispatch/_npu_artifacts/dorado_fast_linear_projection_L1667/
        bionpu/dispatch/_npu_artifacts/dorado_fast_linear_projection_fused_perts_L1667/
      with leaves final.xclbin / insts.bin / host_runner. Both op
      classes grew a ``seq_len`` constructor arg defaulting to L=334;
      ``get_linear_projection_op(seq_len=...)`` forwards it. Encoder.py
      now passes ``seq_len=cur.shape[0]`` (the LSTM timestep count) to
      the helper, picking up either the short or long artifact based
      on what the upstream blocks produced. The legacy short-shape
      path is byte-identical; the long-shape path is purely additive.
    failed_with: null
    root_cause: |
      Legacy artifacts shape-checked the input as (334, 1, 96) and
      produced (334, 1, 256). The encoder's production_long path
      feeds (1667, 1, 96) post-LSTM, so the linear projection fell
      back to CPU. Building second xclbins with the IRON loop-trip-
      count adjusted for 1667 timesteps restores the NPU path.
    workaround: |
      Silicon-validated B_M12_PASS at
      results/basecalling/b-m12-long-shape-rollout/measurements.json:
        per_group  / subprocess wall/iter ~3115 ms (kernel ~2812 ms)
        per_group  / pyxrt wall/iter       ~2980 ms (kernel ~2812 ms)
        fused_perts/ subprocess wall/iter   ~146 ms (kernel ~48.5 ms)
        fused_perts/ pyxrt wall/iter         ~91 ms (kernel ~48.4 ms)
        pyxrt vs subprocess output: byte-equal (max-abs-diff 0.0) for both.
    upstream_issue: null
    blocks: []
    severity: "feature"
    status: "validated"
