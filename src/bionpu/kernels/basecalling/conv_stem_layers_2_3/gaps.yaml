    failed_with: null
    root_cause: |
      Same as the linear_projection (a) story: each subprocess
      invocation pays ~70-80 ms of fork + xrt::device::register_xclbin
      + hw_context construction. The pyxrt path caches the device +
      xclbin + kernel handles in the process-level NpuBackend
      singleton.
    workaround: |
      Silicon-validated C_PYXRT_PASS at
      results/basecalling/b-m10-pyxrt-rollout/measurements.json
      (state/c-pyxrt-rollout-dorado_fast_conv_stem_layer{2,3}-*.json):

      Layer 2:
        subprocess wall/iter   ~280.1 ms (kernel ~183.0 ms)
        pyxrt wall/iter         ~258.2 ms (kernel ~183.0 ms)
        pyxrt 16-iter steady   ~205.9 ms wall/iter (~22.9 ms host overhead)
        pyxrt vs subprocess output: byte-equal (max-abs-diff 0.0).
        Steady-state savings: ~74.2 ms / chunk (kernel-bound; the
        host-overhead gain is bounded by the 183 ms silicon time).

      Layer 3:
        subprocess wall/iter   ~928.3 ms (kernel ~660.3 ms)
        pyxrt wall/iter         ~905.7 ms (kernel ~660.7 ms)
        pyxrt 16-iter steady   ~746.3 ms wall/iter (~85.4 ms host overhead)
        pyxrt vs subprocess output: byte-equal (max-abs-diff 0.0).
        Steady-state savings: ~182.0 ms / chunk.
    upstream_issue: null
