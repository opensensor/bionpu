gaps:
  - id: "track-b-paralog-aware-composite-filter"
    category: "data-coverage"
    op_or_pattern: "Production HGNC gene-group integration for the paralog mapper"
    attempted: |
      Track B v0.1 ships paralog-aware split CFD aggregate
      infrastructure: `bionpu.data.paralog_mapper.get_paralog_spans`
      maps a gene symbol to its sibling paralog gene spans, the T11
      off-target adapter tags each `OffTargetSite.in_paralog`
      accordingly, and the T8 ranker splits the CFD aggregate into
      `cfd_aggregate_pegrna` (non-paralog hits, in the composite) and
      `cfd_aggregate_paralog_pegrna` (in-paralog hits, informational).

      v0.1 ships a HARDCODED paralog map covering only the five v0
      smoke targets (BRCA1, TP53, EGFR, HBB, MYC) plus their
      canonical paralog clusters (hemoglobin family on chr11, ERBB
      family, MYC family, TP63/TP73, BRCA2). Coordinates are
      GRCh38.p14 per NCBI Gene as of 2026-04-28.
    failed_with: null
    root_cause: |
      Production-quality coverage requires ingesting the full HGNC
      gene-group TSV (from
      https://www.genenames.org/cgi-bin/genegroup/download or the
      paralog file at
      https://www.genenames.org/download/statistics-and-files/).
      v0.1 deferred this to keep the bring-up surface minimal; the
      hardcoded map covers the v0 smoke regression surface but will
      miss paralogs for any target outside the five smoke genes.
    workaround: |
      Production callers of `get_paralog_spans` for genes outside the
      v0.1 hardcoded coverage receive an empty tuple; the pe_design
      pipeline transparently falls back to v0 behaviour (every
      off-target hit treated as a true off-target, as v0 did). For
      the v0 smoke targets the v0.1 path is fully functional; for
      arbitrary user targets the worst-case is degradation back to
      v0 (no false negatives, no NaN regressions).
    upstream_issue: null
    blocks:
      - "track-b-pe-design-v1"
    severity: "minor"
    status: "open"
