  - id: "B-batched-stage3-host-amortisation"
    category: "performance"
    op_or_pattern: "linear_projection chunk-outer batching at IRON layer"
    attempted: |
      Build a batched variant of stage-3 fused-perts that processes
      N_CHUNKS chunks per silicon dispatch. Single xclbin load per N
      chunks, single weight slab (48 KiB bf16) shared across the
      batch, IRON loop (chunk-outer + timestep-inner) walks the
      input/output sequentially. Mirrors the CRISPR pam_filter
      LAUNCH_CHUNKS pattern.
    failed_with: |
      n/a — silicon-PASS for N={1, 2, 4, 8}.
    root_cause: |
      n/a — feature add. The B3b bench's 100 ms/chunk host-overhead
      delta (vs 10.65 ms kernel time) is the host-side dispatch
      ceremony (xclbin reload, BO alloc, XRT submit, output sync).
      Batching N chunks into one dispatch collapses this overhead
      to once-per-N-chunks. Per-chunk wall converges toward kernel
      time as N grows (2026-04-28 silicon: N=8 yields 20.7 ms/chunk
      vs the 9.5 ms kernel-only ceiling — still ~11 ms host residual,
      probably output-sync dominated).
    workaround: |
      Build via:
        BIONPU_LINEAR_PROJECTION_BATCH_CHUNKS={1,2,4,8} \
          make NPU2=1 experiment=fused-batched seq=334 all
      Op class: DoradoFastLinearProjectionFusedBatched
      Op name:  dorado_fast_linear_projection_fused_perts_batched
      Wire format: input (N*L*HIDDEN bf16), weight (single 48-KiB
      slab), output (N*L*OUT_DIM bf16). The C++ kernel is unchanged
      (linear_projection_fused.cc); chunk-outer batching is purely
      IRON-side.
    upstream_issue: null
