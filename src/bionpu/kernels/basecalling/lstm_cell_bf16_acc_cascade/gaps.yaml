      starting work or stalling on a cascade synchronisation that
      never completes.

      **2026-04-26 follow-up bisection (item4 agent)**: 8 silicon
      tests under ``tests/cascade_bisection/`` performed under the
      NPU mutex. Evidence files at
      ``state/followup/item4/silicon-*-{iso8601}.log`` and lowered
      MLIR snapshots under the same dir.

      Bisection table (every test silicon-run on AIE2P / NPU2):

        step  | topology + scope                                                | result
        ------+-----------------------------------------------------------------+-------
        1     | baseline (existing 5-tile LSTM xclbin from T1 build)             | WEDGE
        2     | 2-tile cascade vertical (0,3)->(0,2), 1 put/get total            | PASS  (842us)
        3     | 4-tile cascade all vertical col 0 rows 5..2, 1 put/get/iter      | PASS  (1662us)
        4     | 5-tile cascade 4v + 1h, (0,5)->(0,4)->(0,3)->(0,2)->(1,2)        | PASS  (1371us)
        5     | step4 + L=334 long loop, 6 puts+6 gets/iter (2004 transfers)     | PASS  (2016us)
        6     | step5 + memtile-split objectfifo (3 host BOs, mirrors LSTM ABI)  | PASS  (1440us)
        7     | step6 + LSTM-style 16-calls/iter, cascade ONLY in conditional    | WEDGE (5.97s, TDR+1)
        8     | step6 + LSTM-style 16-calls/iter, cascade UNCONDITIONAL/call     | PASS  (2066us)
        fix1  | original LSTM kernel + cascade ops moved to dedicated entry
                points called once per timestep at IRON-loop level              | WEDGE (5.19s, TDR+1)

      **Bisection conclusion**: The wedge is NOT the cascade primitive,
      NOT the horizontal hop, NOT the multi-tile chain length, NOT the
      long-loop iteration count, NOT the memtile-split objectfifo, NOT
      the LSTM math arithmetic. The wedge IS triggered by some
      interaction between (a) multiple kernel calls per IRON-loop
      iteration with (b) cascade ops issued from one of those calls
      (whether conditional inside a per-call branch OR consolidated
      into a dedicated cascade-only call at the IRON top level).

      The minimal failing reproducer (step 7, NO LSTM math) is at
      ``tests/cascade_bisection/topology_5tile_lstm_call_pattern/``.
      The minimal passing variant (cascade fires every kernel call)
      is at
      ``tests/cascade_bisection/topology_5tile_lstm_call_unconditional/``.
      Both share the same LSTM-shape call structure (16 calls/iter
      with (g, t, chunk_idx) parameters, memtile-split, L=334); the
      only material difference is cascade-firing-frequency.

      **Fix attempt 1 (FAILED)**: refactored ``lstm_layer_cascade.cc``
      to lift cascade put/get out of conditional branches into
      dedicated extern "C" entry points
      (``dorado_fast_lstm_cascade_put_h``,
      ``dorado_fast_lstm_cascade_get_h_to_x_bf16``,
      ``dorado_fast_lstm_h_state_to_y_t``,
      ``dorado_fast_lstm_final_state_update``) called once per timestep
      at the IRON-loop level. Per-chunk math kernels became math-only.
      Identical wedge fingerprint (DPU PC 0xffffffff, Context PC
      0x28b060ad, 5.19s NPU time, TDR counter advanced 498->499). The
      narrowed hypothesis (cascade-in-conditional) is INCOMPLETE —
      moving cascade out of the per-chunk conditional did NOT lift the
      wedge. The fix attempt was reverted; the lowered MLIR is kept at
      ``state/followup/item4/lstm-fix-attempt-input_with_addresses.mlir``
      and the failed silicon-test log at
      ``state/followup/item4/silicon-fixed-lstm-{iso8601}.log``.
    failed_with: |
      Symptom (no exception raised on the host side):
        - host runner reports "Avg NPU time: 5909740us" (~ TDR window)
        - output buffer remains all-zero (not just close-to-zero)
        - dmesg aie2_tdr_work counter advances by 3 across one dispatch
        - Multiple aie2_dump_ctx Firmware-timeout blocks captured
        - DPU PC = 0xffffffff (no work executed)

      Step 7 reproducer (NO LSTM math, just LSTM-style call structure)
      and fix-attempt-1 (LSTM math + cascade-only kernel split) both
      reproduce the SAME wedge fingerprint:
        - DPU PC: 0xffffffff
        - Context PC: 0x28b060ad
        - Fatal error type: 0x0
        - msg: 0x1d000001
        - aie2_tdr_work counter advances by 1 (vs 3 in T1's original
          dispatch — fewer increments because step 7's runner has
          shorter pre-/post-dispatch latency, but the per-dispatch
          stall behavior is identical).
    root_cause: |
      **2026-04-26 update**: Bisection (8 silicon tests, see
      ``state/followup/item4/``) has falsified the original
      hypotheses (horizontal hop, multi-tile chain, long-loop count,
      memtile-split, LSTM math) and narrowed the wedge to the
      multi-kernel-call-per-IRON-iteration + cascade-firing-pattern
      interaction. Step 7 reproduces the wedge with NO LSTM math; step
      8 lifts the wedge by making cascade fire on EVERY kernel call
      (instead of just one per timestep).

      First-attempt fix (split cascade into dedicated entry points
      called at IRON-loop top level) FAILED — same wedge fingerprint.

      **2026-04-26 followup-C update — MLIR + ELF diff narrows the wedge
      to a peano-emitted instruction-level pattern.** Full evidence at
      ``state/followup-c/`` (MLIR diff: file 03; ELF diff: file 04).

      MLIR-LEVEL FINDING: The lowered MLIR (``input_with_addresses.mlir``)
      between step 6 PASS, step 7 WEDGE, and step 8 PASS is byte-identical
      across every section EXCEPT the per-tile ``aie.core(...)`` body.
      All 5 ``aie.mem(...)`` blocks are byte-identical between PASS and
      WEDGE; ``aie.memtile_dma`` is byte-identical; ``aie.configure_cascade``
      ops are identical (5 ops with the same {N,S,E,W} mapping); all 8
      ``aie.flow`` ops are identical; all 30 ``aie.lock`` declarations
      are identical. The only MLIR-level lock delta is +8 ``aie.use_lock``
      ops on the input/output ObjectFifo locks (WEDGE acquires once
      per ts vs PASS acquires once per call) — there are NO MLIR-level
      lock ops on cascade-related locks in either variant.

      The MLIR diff between step 7 (WEDGE) and step 8 (PASS-unconditional)
      is **44 lines, 100 % of which are pure string substitutions**
      (``lcp_*`` ↔ ``lcu_*``, ``...pattern.o`` ↔ ``...unconditional.o``).
      This proves the wedge cause is NOT in MLIR-level lowering.

      ELF-LEVEL FINDING (load-bearing): Disassembling the per-tile
      ``main_core_*.elf`` with ``$PEANO_INSTALL_DIR/bin/llvm-objdump
      -d <elf>`` shows:

        variant       per-tile cascade-fn branches (jnz/jne)  result
        ──────────────────────────────────────────────────────────────
        step 6 PASS   0 in every tile                         PASS
        step 8 PASS   0 in every tile                         PASS
        step 7 WEDGE  3 in every tile                         WEDGE

      Every WEDGE per-tile cascade kernel function (``cascade_5t_lcp_*``)
