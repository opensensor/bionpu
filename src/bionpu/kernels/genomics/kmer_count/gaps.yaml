            make NPU2=1 K=$K n_passes=$NP experiment=wide4 all
          done
        done
      Then re-run the T15 bench across the full 9-cell matrix
      (3 fixtures × 3 k × 1 n_tiles × 3 n_passes = 27 cells).
    upstream_issue: null
    blocks:
