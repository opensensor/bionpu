  - id: ""
    category: "schedule-dataflow"
    op_or_pattern: "Production weight direct-stream suffix chain"
    attempted: |
      Added an opt-in ``production-weight-direct-stream`` experiment after
      the CRISPR packetized-stream result. The path keeps the production
      host ABI on tile 0, replaces full-frame inter-core ObjectFifos with
      explicit Core:0 ``aie.flow`` routes, and moves bf16 payload transfer
      into Peano AIE2P C++ intrinsics:

        - ``dorado_prod_stream_first_*``
        - ``dorado_prod_stream_middle_*``
        - ``dorado_prod_stream_last_*``

      The L=1 xclbin builds successfully:

        make NPU2=1 experiment=production-weight-direct-stream seq=1 all

      Follow-up bisection added ``production-weight-direct-stream-probe``:
      the same production 16-frame weight traffic and same four Core:0
      direct-stream routes, but with cascade and LSTM math removed. The last
      tile writes the first 96 bf16 words of the final streamed layer chunk
      so the probe has a byte-equality oracle.
    failed_with: |
      Silicon smoke timed out after 120 seconds with no output:

        logs/dorado-prod-direct-stream-20260426T084728Z

      This is not the previous aiecc tile-memory failure. The build gets
      past the full-frame middle-tile ObjectFifo allocation problem, but
      the naive chain deadlocks at runtime.

      The no-cascade probe PASSED on silicon:

        logs/dorado-prod-direct-stream-probe-20260426T085933Z
        Avg NPU time: 3720us
        output: 96/96 nonzero, byte-equal to expected final chunk
    root_cause: |
      The CRISPR stream pattern does not directly transfer to Dorado because
      Dorado has an inter-layer sequence dependency. Middle layer 1 receives
      the first weight-frame suffix and then blocks on the layer-0 cascade
      value before it can receive frame 2. Layer 0 cannot produce that
      cascade value until after all 16 gate/chunk computations for the
      timestep, but it cannot start streaming frame 2 because layer 1 is no
      longer draining the stream.

      In short:

        stream frame 0 -> layer 1 waits on cascade
        layer 0 needs to stream frames 1..15 before cascade_put
        layer 0 blocks because layer 1 stopped draining

      Avoiding this requires either buffering all 16 local chunks per layer
      before cascade (too large for tile DM), or changing the distribution
      topology so each layer's weights arrive after its cascade input without
      relying on the previous layer to hold/forward later-layer suffixes.

      The passing no-cascade probe rules out the direct Core:0 stream route
      and Peano ``put_ms`` / ``get_ss_int`` bf16 packing as the root cause.
      The failure requires the production-style cascade wait interleaved with
      the stream-forwarding schedule.
    workaround: |
      Keep ``production-weight-direct-stream`` as a buildable negative
      experiment, not a promotion candidate. The next viable Dorado lever is
      not a CRISPR-style suffix chain; it is one of:

        1. a host/runtime ABI that delivers per-layer chunks directly to each
           tile without exceeding kernel BO limits,
        2. a memtile/BD layout that performs the split without the unsafe
           full production topology, or
        3. a monolithic per-layer schedule that computes all chunks with
           local weights already resident, then emits cascade.
    upstream_issue: null
    blocks:
      - ""
    severity: "blocker"
    status: "open"

  - id: ""
    category: "host-abi"
    op_or_pattern: "Five independent per-layer production weight BOs"
    attempted: |
      Added ``production-weight-direct-layer-probe`` to test direct runtime
      fanout: five independent layer-weight runtime inputs, one per tile,
      no memtile split, no tile-to-tile forwarding, no cascade, and no LSTM
      math. The runner keeps the existing consolidated weight file format
      and splits it into five layer-major BOs under
      ``--direct-layer-weights``.

      The xclbin builds cleanly:

        make NPU2=1 experiment=production-weight-direct-layer-probe seq=1 all

      Unlike the stream-suffix probe, this emits no first-tile 53.7KB
      bank-placement warning because each tile only receives one 5376-bf16
      chunk buffer.
    failed_with: |
      Host launch fails before dispatch:

        logs/dorado-prod-direct-layer-probe-20260426T090346Z
        terminate called after throwing an instance of 'std::out_of_range'
        what(): vector::_M_range_check: __n (which is 8) >= this->size() (which is 8)

      The failure happens when the runner asks XRT for ``kernel.group_id(8)``
      while allocating the fifth layer-weight BO. The kernel's argument group
      table has only indices 0..7 in this build.
    root_cause: |
      The current MLIR_AIE/XRT ABI cannot launch input + five independent
      per-layer weight BOs + output + trace. This reproduces the original
      reason the production path consolidated weights into one host BO before
      using memtile split.

      Direct runtime fanout is therefore not a drop-in replacement for
      ``ObjectFifoHandle.split`` unless the BO count is reduced or the host
      ABI/toolchain limit is lifted.
    workaround: |
      Continue with reduced-BO layouts:

        1. four direct per-layer BOs plus one packed/shared BO for the
           remaining layer(s),
        2. two or three packed group BOs with on-tile local unpacking,
        3. a memtile split variant with fewer output endpoints or safer BD
           pressure than the original production split.

      The direct-layer probe is retained as a buildable ABI boundary test,
      not a silicon performance candidate.
    upstream_issue: null
    blocks:
      - ""
    severity: "blocker"
    status: "open"
