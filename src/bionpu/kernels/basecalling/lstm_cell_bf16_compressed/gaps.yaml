        build surfaced asymmetric BD emission (producer MM2S got
        aie.enable_compression=true, consumer S2MM did not). The
        new closure ships on
        feature/-split-fifo-attr-propagation as commit
        930e23c7 and is a two-part fix.

        **Part 1 — split-fifo attr propagation
        (AIEObjectFifoStatefulTransform.cpp:~1976).** Right after
        ``replaceSplitFifo(createOp, consumerFifo, consumerTileOp);``
        the new consumerFifo now copies the SparseFifo discardable
        attrs (aie.compress_mm2s, aie.decompress_s2mm,
        aie.sparsity_pattern, aie.sparsity_n, aie.sparsity_m)
        from the original createOp. Without this, the consumer-
        side ObjectFifoCreateOp was attr-less and the existing
        propagateSparseCompressionAttr returned without setting
        the bit on any consumer-side BD. Closes the consumer-side
        propagation gap end-to-end.

        **Part 2 — cross-module footgun guard
        (propagateSparseCompressionAttr).** The function now walks
        up from the DMABDOp to its parent (MemOp / MemTileDMAOp /
        ShimDMAOp) and only emits aie.enable_compression on
        compute-tile (MemOp) BDs. Per AM029:
          * Compute-tile MEMORY_MODULE DMA_BD0_1 bit 31 = Enable_Compression
          * Memory-tile MEMORY_TILE_MODULE DMA_BD0_1 bits 31:26 = D0_Pad_Before
          * Shim DMA: AM029 documents the bit only for "AIE-ML
            memory and AIE-ML tile DMA" — not for shim.
        Setting the attr on a memtile or shim BD would silently
        corrupt an unrelated field (memtile) or set an undocumented
        bit (shim). The guard prevents both classes of mis-emission
        AND incidentally fixes the LSTM topology (shim -> compute
        SparseFifo): the LSTM's SparseFifo had compress_mm2s
        pinned on a shim-side BD, which the guard now correctly
        skips, and the consumer-side compute-tile S2MM gets the
        bit it actually needs.

