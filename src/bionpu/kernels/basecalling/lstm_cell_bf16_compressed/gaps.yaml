           topology still assume dense traffic.
        4. Channel-capability gating. AMD's "only effective if
           channel has (de)compression enabled" qualifier leaves
           room for a channel-level enable register or
           silicon-capability bit that AIE2P/Ryzen client silicon
           may or may not surface — distinct from the BD-word bit.
        5. Element-format mismatch. AM029's sparsity section
           describes the compression algorithm in terms of 8-bit
           samples + 32-bit mask + 256-bit words; bf16 sparse
           weights are not documented as an accepted input format,
           and AIE2P may simply reject them.

