  - id: ""
    category: "performance"
    op_or_pattern: "scalar tanh / sigmoid in Peano AIE2P FP32 kernel"
    attempted: "3rd-order Padé tanh approximation in scalar_tanh_padé(); sigmoid via 0.5*(tanh(0.5x)+1) identity. Avoids stdlib <cmath> dependency (newlib bits unsupported on AIE2P)."
    failed_with: null
    root_cause: "AIE2P has aie::tanh<bfloat16> vector intrinsic (used in aie_kernels/aie2p/silu.cc) but no scalar FP32 tanh in v1 IRON bindings. v1 path uses Padé approximation with ~3e-3 max error on [-3, 3]."
    workaround: "Padé approximation. Per-block LSTM max-abs drift vs CPU reference is ~1e-1 to ~1e0 (cumulative); the v1 path FAILS the 1e-4 task-brief gate but ships per the 'document achieved bound honestly' clause. will replace with bf16 vector tanh; expected to bring drift to the 1e-4 range."
    upstream_issue: null
    blocks: ["", ""]
    severity: "workaround"
  - id: ""
    category: "performance"
    op_or_pattern: "Conv1d(in=16, out=96, kernel=19, stride=6, padding=9) — large weight + large input on a single tile (conv_stem_layer3)"
    attempted: "IRON lowering with full output tensor on tile. Total weight 117 KiB, input 126 KiB, output 125 KiB — none individually fit in 64 KiB."
    failed_with: null
    root_cause: "Single-tile data memory budget (64 KiB) cannot hold any of the three full tensors. Multi-tile sharding for stride-6 Conv1d is non-trivial."
    workaround: "Chunked along output time axis with T_chunk_out=1 + sharded along output channels into 6 OC groups of 16 each. 6 OC groups × 334 timesteps = 2004 kernel calls per layer-3 invocation. Host materialises T_OUT repetitions of the 6-OC-group weight cycle (~37 MB of host-side data per call); BD-level repeat patterns would eliminate this bloat in a future revision."
    upstream_issue: null
    blocks: []
    severity: "workaround"
  - id: ""
    category: "performance"
    op_or_pattern: "Per-call setup overhead dominates wall time on small-tensor encoder ops (linear_projection, conv_stem_layers_2_3). After the LSTM cascade unblock these ops become the encoder bottleneck — call fusion on them is the next post-cascade speedup lever."
    attempted: |
      Direct measurement on results/basecalling/b-m6/measurements.json
      (bf16, n_iters=1, warmup=0):

        linear_projection : 564 ms / 1336 calls = ~422 µs/call
        stem_L3 (layer3)  : 661 ms / 2004 calls = ~330 µs/call
        stem_L1 (layer1)  :  12 ms /   ~ calls  = (single-call shape; baseline)
        LSTM L_n          :  45 ms /  one-tile-call-per-ts pre-cascade

      For comparison, the AccumFifo token-order microtest (no math)
      runs 5-tile horizontal cascade at 334 production-shaped
      timesteps in 1.14 ms — i.e. the cascade infrastructure
      processes 334 timesteps end-to-end for less wall time than
      one stem_L3 chunk pays in setup overhead. The math budget on
      either op (96×64 GEMM per call for linear_projection;
      16×16 conv1d slab for stem_L3) is sub-microsecond at
      AIE2P 50 TOPS; the rest is per-call setup, weight acquire,
      output BD release, and kernel-call frame.
    failed_with: null
    root_cause: |
      Same call-count-bound pattern that motivated the LSTM cascade
      rebuild, applied to the rest of the encoder:

      - linear_projection: T_LSTM × N_OC_GROUPS = 334 × 4 = 1336
        kernel calls per dispatch. Weight is 96×256 = 24576 fp32
        elements (96 KiB) — does NOT fit a single AIE2P tile L1 at
        fp32, but fits cleanly at bf16 (48 KiB).
      - conv_stem_layer3: 6 OC groups × 334 timesteps = 2004 calls
        per dispatch (already documented at ). Weight
        117 KiB at fp32 does not fit; fits at bf16.

      Once the LSTM cascade lands, the encoder wall-time shape
      becomes ~few-ms LSTM cascade + ~1.2 s stem+linear_projection.
      Cascade alone does not produce a competitive throughput
      number — it relocates the bottleneck.
    workaround: |
      None landed. The fusion design for linear_projection is
      sketched at
      ``bionpu/kernels/basecalling/linear_projection/DESIGN-fusion.md``:
      a streaming-style kernel that acquires the full bf16 weight
      slab once at start, then loops over T_LSTM timesteps × 4 OC
      groups internally on a single tile call. Estimated 1336 → 1
      kernel call per dispatch.

      Equivalent fusion for conv_stem_layer3 has not yet been
      sketched; the larger weight footprint (117 KiB fp32 / ~58 KiB
      bf16) and stride-6 input access pattern likely require a
      multi-tile shard rather than a single-tile streaming kernel.
    upstream_issue: null
    blocks: [""]
    severity: "blocker"

  - id: "C-pyxrt-in-process-dispatch"
    category: "host_dispatch"
    op_or_pattern: "Replace subprocess host_runner with in-process pyxrt for DoradoFastConvStemLayer2 + Layer3"
    attempted: |
      Added BIONPU_CONV_STEM_LAYER2_DISPATCH and
      BIONPU_CONV_STEM_LAYER3_DISPATCH env vars
      ({subprocess,pyxrt}; also accepted as
      DoradoFastConvStemLayer{2,3}.__call__(_impl=...)) routing
