    category: "correctness"
    op_or_pattern: "AIE2P SparseFifo MM2S path wedges when the documented compute-tile DMA_BD*_1[31] Enable_Compression bit is set without a ratified AIE2P compression/decompression channel contract."
    attempted: "After closed at the compiler level (lit test verified bit-31 of DMA_BDX_1 flips correctly; new fork SHA 73e48b0a), the orchestrator rebuilt 's xclbin against the post-fix wheel. A/B-tested OLD vs NEW vendored xclbin on the same NPU device (Strix [0000:67:00.1], firmware 1.1.2.64, XRT 2.23.0) within a ~10-minute window, same kernel sources, same input fixture, same test code (tests/test_lstm_compressed_npu.py::test_compressed_vs_dense_max_abs). OLD xclbin (sha256 d3632b20...; Enable_Compression=0): real silicon output, pruned vs dense per-timestep mean max-abs = 0.165 (the genuine 2:4-pruning-induced precision delta on synthetic Gaussian L=334). NEW xclbin (sha256 96bd58bf...; Enable_Compression=1 on the SparseFifo MM2S channel): zero output for BOTH dense AND pruned; dmesg captured a fresh aie2_dump_ctx Firmware timeout state capture at kernel-time 68225 (DPU PC: 0xffffffff, op: 0x0 msg: 0x1d000001 fence: unsignaled) — same wedge signature as but with an unambiguous cause: the only thing that changed between the two runs was the BD config word's bit 31."
    failed_with: "AIE2P firmware timeout state capture; zero output on subsequent submissions until TDR drain. No userspace error returned to host_runner."
    root_cause: |
      Unknown. Bit 31 is the documented Enable_Compression field for
      compute-tile MEMORY_MODULE DMA BD word 1 (AM029 AIE-MLv2
      register reference; AM020 Ch. 2 p. 27 cross-walk), but it is
      direction-dependent: MM2S selects compression and S2MM selects
      decompression, and AMD documents it as effective only on
      channels with compression/decompression support. The observed
      AIE2P wedge therefore proves that compiler-side bit emission
      reaches silicon, NOT that standalone SparseFifo MM2S
      compression is valid on Ryzen AIE2P.

      AM029 sharpening (2026-04-25 re-read): there are THREE
      compression mechanisms, not two — and the BD bit only covers
      two of them.
        (i)  Tile-DMA compression: BD bit, symmetric MM2S
             compress / S2MM decompress. AM029-documented use case
             1 ("Compression and Decompression in DMAs"). Both
             endpoints must be a compute tile (or memtile per (ii));
             the algorithm is 8-bit samples + 32-bit mask + 256-bit
             word.
        (ii) Memory-tile (memtile) DMA compression: same BD bit
             field on the memtile DMA. Document for memtile-mediated
             supply, AM020 Ch. 5 p. 74.
        (iii) On-the-fly core-load decompression: AM029-documented
             use case 2 ("Offline Compression and Decompression in
             Core Load Interface"). NOT a BD bit; this is a separate
             core-instruction-side mechanism. Tile memory holds the
             compressed payload and the core decompresses on load.
             SparseFifo does NOT emit anything that triggers this
             path; the LSTM kernel is not using it.

      AM029 explicitly documents the BD bit for "AIE-ML memory and
      AIE-ML tile DMA" — it does NOT document the bit for SHIM DMA.
      's SparseFifo for the LSTM weights has SHIM as the
      producer (host BO -> shim -> compute-tile S2MM); the
      SparseFifo lowering pins aie.compress_mm2s=true on the
      producer side, which on the LSTM topology lands on a SHIM-side
      BD where the bit is undocumented.

      Strong hypothesis (added 2026-04-25): the LSTM weight BO is
      already pre-compressed offline by host-side N:M structural
      pruning (the Phase 1 sparsity_pass.py contract). If the
      shim DMA also tries to compress on the way out (because
      compress_mm2s=1), the shim may compress already-compressed
      bytes, the compute-tile S2MM gets double-compressed bytes
      that don't match the documented 8-bit / 32-bit-mask / 256-bit-
      word format, and the firmware times out. AM029 doesn't warn
      against this because it doesn't document shim-side
      compression at all.

      Candidate missing-contract pieces (none individually proven
      from the wedge alone — the wedge is consistent with any of
      them):
        1. Shim-vs-tile DMA divergence (the strong hypothesis
           above). Closest to the observed evidence.
        2. Direction inversion. If the path were tile-tile, MM2S
           still asks the DMA to *compress* outgoing dense data,
           which is the wrong semantic direction for a payload that
           is already compressed.
        3. No matching decompressor downstream. MM2S compression
           changes stream encoding; if the consuming core / FIFO /
           DMA still expects dense words, it can starve, miscount,
           or wait forever — a firmware timeout is exactly the
           expected failure shape.
        4. Length / lock / token mismatch. Compression makes output
           length data-dependent; BD lengths, locks, token issue,
           FIFO depth, and consumer loop counts in the IRON-emitted
           topology still assume dense traffic.
        5. Channel-capability gating. AMD's "only effective if
           channel has (de)compression enabled" qualifier leaves
           room for a channel-level enable register or
           silicon-capability bit that AIE2P/Ryzen client silicon
           may or may not surface — distinct from the BD-word bit.
        6. Element-format mismatch. AM029's sparsity section
           describes the compression algorithm as 8-bit samples +
           32-bit mask + 256-bit words; bf16 sparse weights are not
           documented as an accepted input format, and AIE2P may
           simply reject them.

      Cross-module footgun (analytical, not observed): bit 31 of
      DMA_BD0_1 is NOT Enable_Compression on the MEMORY_TILE_MODULE
      variant — there bits 31:26 are D0_Pad_Before. Any compiler
      pass, decoder, or mental model that crosses compute-tile
      MEMORY_MODULE and MEMORY_TILE_MODULE without distinguishing
      them will silently corrupt one or the other. The
       fix should be re-audited for module-type
      discrimination before any future closure attempt.

      Candidate missing-contract pieces (none individually proven
      from the wedge alone — the wedge is consistent with any of
      them):
        1. Direction inversion. The pruned-weight stream the
           SparseFifo carries is the COMPRESSED payload coming in
           from external memory; the documented decompression path
           is the *S2MM* channel. Setting bit 31 on MM2S asks the
           DMA to *compress* outgoing dense data, which is the wrong
           semantic direction for the LSTM weight-load path.
        2. No matching decompressor downstream. MM2S compression
