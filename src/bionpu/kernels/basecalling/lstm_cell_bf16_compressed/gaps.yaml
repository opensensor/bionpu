    op_or_pattern: "N:M sparsity pattern choice (1:2 vs 1:4 vs 2:4) for Dorado fast LSTM weights — accuracy/sparsity tradeoff under bf16"
    attempted: "Per the brief: 'Pick the most conservative pattern that meets the accuracy contract; document the choice.' Default to 2:4 (the AM020 Ch. 1 p. 15 RNN-application example, GPU-style; 50% of weights kept) over 1:4 (75% sparsity, more aggressive) and 1:2 (50% kept but with M=2 grouping which is structurally weaker than M=4). Verified the structural correctness in `verify_nm_pattern`: every group of M elements along the last axis has at most N nonzeros."
    failed_with: null
    root_cause: "Dorado fast trained weights have a long-tailed magnitude distribution (max-abs ~ 1-13 across layers, 's measurement). 1:4 and 1:2 patterns drop 75% / 50% of weights; the magnitude-prune-by-group rule keeps the largest in each group, but on highly-correlated channels (LSTM gate weights for `f` and `i` saturate similarly) the per-group-largest can correlate across groups, amplifying the drift versus a magnitude-global prune. 2:4 keeps 50% with finer M=4 granularity; the kept-mass is empirically tighter in numerical matches with the dense reference."
    workaround: " ships with **N=2, M=4 as default** (`tracks.basecalling.quant.sparsity_pass.DEFAULT_N` / `.DEFAULT_M`). The pass module + the kernel `__init__.py` both expose N/M as kwargs so an operator can A/B 1:4 / 1:2 / 2:4 by toggling a single parameter. The accuracy contract test (`tests/test_lstm_compressed_npu.py::test_compressed_vs_dense_max_abs`) gates only the chosen production pattern's ≤ 0.1 max-abs; if a downstream task re-runs the pass at 1:4, that test will refire and surface any breach honestly."
