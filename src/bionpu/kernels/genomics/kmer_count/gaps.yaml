gaps:
  - id: "kmer-n8-memtile-dma-cap"
    category: "expressibility"
    op_or_pattern: "n_tiles=8 memtile-aggregated combine"
    attempted: |
      T11 sweep at n_tiles=8 across all 3 k values. The memtile-
      aggregated combine topology (T11 Fix C; mirrors
      crispr/match_multitile_memtile/multitile_memtile.py) routes
      one partial ObjectFifo per match tile through the memtile via
      `outC.prod().join(N partials, ...)`. At N=8 this exceeds the
      AIE2P MemTile DMA channel budget.
    failed_with: |
      aiecc placement pipeline:
        'aie.tile' op no MemTile with sufficient DMA capacity
        Error: Tile placement pipeline failed
      Reproduces deterministically across all 3 k values; MLIR-emit
      step succeeds and kernel .o compiles, but tile-placement pass
      rejects the topology.
    root_cause: |
      AM020 Ch. 5 p. 74 documents AIE2P MemTile as 6 S2MM + 6 MM2S
      DMA channels. The memtile-join `prod().join(N=8, ...)` topology
      consumes 1 S2MM channel per producer tile (8 needed) plus 1
      MM2S channel for the shim drain — exceeding the 6 S2MM budget.
      Same hardware spec limit hit by `crispr/match_multitile/`
      ATTEMPT-2 (4-into-1 on a CoreTile, 2-channel cap), which is
      why `crispr/match_multitile_memtile/` was created — but that
      fix only stretches to N≤6 effective producers per memtile.
      N=8 needs a different topology.
    workaround: |
      Three known paths, all deferred to a v1.1 follow-on PRD
      after Wave-5 silicon validation of the n ∈ {1, 2, 4} matrix:

      (1) Two-stage memtile fan-in: 8 producers → 2 intermediate
          memtile slots of 4 each → 1 final memtile. Stays within
          6 S2MM/memtile (4 S2MM + 1 MM2S = 5/6 used per stage).
          Adds 1 hop of latency. ~4-8 hrs incl. silicon round-trip.
      (2) Multi-memtile-column placement: 8 producers → 2 memtiles
          in different columns. Less proven; cross-column routing
          constraints unknown.
      (3) Cap n_tiles at 4 in the schema: drop n_tiles=8 from
          BIONPU_KMER_COUNT_LAUNCH_CHUNKS allowed values. The
          speedup curve from n=1→4 captures most parallelism on
          AIE2P silicon (CRISPR pam_filter saw diminishing returns
          past 4 tiles).

      v1 ships path (3) by acceptance: Wave 5 silicon-validates and
      benchmarks the 9-cell matrix (3 k × 3 n_tiles); a v1.1 PRD
      will revisit (1) or (2) once the n=1/2/4 throughput curve is
      empirically known.
    upstream_issue: null
    blocks: []
    severity: "deferred"
    status: "deferred-to-v1.1"

  - id: "kmer-chr22-canonical0-cap-fire"
    category: "correctness"
    op_or_pattern: "per-chunk MAX_EMIT_IDX_V05 cap fires on centromere all-A runs"
    attempted: |
      v1.0 T13/T14: silicon-validated v0.5 on chr22 at k=21,
      n_tiles=4, n_passes=4. canonical=0 NPU keep = 2 977 273 vs
      oracle 11 669 944.
      v1.1 (a) (this report, 2026-04-28): rebuilt at n_passes=16
      (3 K × 16 passes = 48 xclbins; 14s wall per K) and re-ran
      chr22 byte-equal. canonical=0 NPU keep = 2 992 193 — barely
      changed (delta = +14 920). Hypothesis "n_passes=16 redistributes
      all-A across 16 slices" is DISPROVED.
    failed_with: |
      v1.0 (np=4): canonical=0 NPU=2 977 273 vs oracle=11 669 944
        (delta = -8 692 671).
      v1.1 (np=16): canonical=0 NPU=2 992 193 vs oracle=11 669 944
        (delta = -8 677 751). chr22 top-100 byte-equal = 16/100;
        top-1000 byte-equal = 486/1000. The remaining 84 top-100
        mismatches are EXCESS counts of +7 to +8 (the
        kmer-chunk-overlap-double-emit gap, scope of v1.1 (c)).
    root_cause: |
      REVISED 2026-04-28 after v1.1 (a) data:

      The kernel filter is
        emit IFF (canonical & pass_mask) == pass_idx
             AND ((canonical >> n_passes_log2) & tile_mask) == tile_idx
      For canonical=0, ALL bits are zero: pass_slot=0 and tile_slot=0
      regardless of (n_passes, n_tiles). canonical=0 ALWAYS lands in
      slot (pass=0, tile=0). Increasing n_passes from 4 to 16 only
      reduces COMPETITORS for that slot; it does not redistribute
      canonical=0 itself.

      Per-chunk math (k=21, advance=4088 B/chunk, ~16 352 bases):
        - chr22 has ~12.0 M all-A k-mers from centromere N→A scrub.
        - Fully-all-A chunks ≈ 12.0 M / 16 352 ≈ 734 chunks.
        - Each fully-all-A chunk produces ~3 924 all-A k-mers in
          slot (0, 0), saturating MAX_EMIT_IDX_V05 = 4 095.
        - Total kept ≈ 734 × ~4 078 = ~2.99 M. Observed: 2.99 M.
          (Match confirms the cap fires per fully-all-A chunk.)

      Conclusion: the cap is fired by all-A k-mers ALONE in centromere-
      resident chunks, not by competition with other canonicals.
      n_passes increase cannot fix this because all-A is invariant
      under the pass/tile slice mask (zero-bits stay zero-bits).
    workaround: |
      v1.1 (a) data shows n_passes=16 alone insufficient. Real fixes
      (none attempted; kernel/IRON/runner locked at v1.1 (a)):

      (A) Larger MAX_EMIT_IDX_V05: the 4 095 cap derives from a
          32 KiB output BO (32 768 - 4 prefix) / 8 bytes/canonical.
          Raising BO to 64 KiB gives cap = 8 191 — enough for fully-
          all-A chunks at k=21 (~3 924 entries). Requires CoreTile
          DM budget audit (kmer_count_constants.h pinned 32 KiB for
          a reason — the AIE2P CoreTile DM is 64 KiB total).
      (B) Smaller chunk size: drop SEQ_IN_CHUNK_BYTES_BASE from 4096
          to 2048. Halves all-A k-mers per chunk to ~1 962, well
          below the 4 095 cap. Doubles the chunk count → doubles
          dispatch overhead. ~2× silicon wall on chr22.
      (C) Special-case canonical=0 in the kernel: dedicated counter
          slot for the all-zeros canonical (not in the emit-list),
          summed by host. Most hardware-correct fix; no chunk-cap
          impact. Requires kernel C source change + IRON Python
          tile-DMA layout change. Contract bump.
      (D) SLICE_HASH_SHIFT > 0 with non-zero base: the current
          slicing uses `canonical & pass_mask`. A different mix —
          e.g. `((canonical * GOLDEN_RATIO) & pass_mask)` — would
          spread canonical=0 across (pass, tile) slots only if the
          mix moves the all-zeros input off the all-zeros output.
          Requires investigation; likely Peano-implementable.

      Path (C) is the cleanest. Path (A) is the cheapest if the DM
      budget allows. Both are v1.1 (c) or v1.2 PRD scope.
    upstream_issue: null
    blocks: []
    severity: "correctness"
    status: "open"
    history:
      - "v1.0 (T13/T14): observed at np=4."
      - "v1.1 (a) (2026-04-28): retest at np=16 disproved n_passes hypothesis. Root cause REVISED to per-chunk cap on centromere-resident all-A chunks. Real fixes A-D documented; none implemented."

  - id: "kmer-chunk-overlap-double-emit"
    category: "correctness"
    op_or_pattern: "runner.cpp chunked dispatch overlap region"
    attempted: |
      T13 + T14 silicon validation at chr22 scale. The host runner
      dispatches the input in 4 KiB chunks with per-k overlap
      (k=15: 4 B; k=21/31: 8 B per T1 contract).
    failed_with: |
      NPU output diverges from Jellyfish by 3-8 excess on each
      canonical at the top of the count distribution (T14 top-1000
      diffs first 50). Top-1000 Jaccard = 0.988, but counts are
      systematically 3-8 above Jellyfish for high-frequency
      canonicals.
    root_cause: |
      The runner's chunked dispatch counts boundary k-mers in two
      adjacent chunks because the overlap region is processed by
      both. For each chunk-pair boundary, ~k-1 extra k-mers are
      emitted. With ~3 102 chunks across chr22 and a power-law
      count distribution, the high-frequency canonicals receive a
      systematic 3-8 excess.
    workaround: |
      v1.1 fix: emit only when k-mer start-index is in the chunk's
      "owned" range, not the overlap region. Specifically, for
      chunk `i` with overlap `O`:
        owned_start = (i == 0) ? 0 : O
        owned_end   = chunk_payload_capacity - O  (except last chunk)
      The kernel signature needs a 6th int32_t `owned_start_offset`
      (or the runner pre-shifts `n_input_bytes` to the owned
      region). Either path is straightforward but contract-bumping;
      v1.1 PRD will pin which.
    upstream_issue: null
    blocks: []
    severity: "performance"
    status: "deferred-to-v1.1"

  - id: "kmer-host-postpass-python-bottleneck"
    category: "performance"
    op_or_pattern: "BionpuKmerCount.__call__ Jellyfish-FASTA parse"
    attempted: |
      v1.1 (b) shipped: runner --output-format {fasta, binary} CLI arg
      added to runner.cpp; emit_binary_blob writes
        [uint64 n_records LE][n_records × {uint64 canonical, uint64 count}]
      Op-class `BionpuKmerCount.__call__` subprocess path now passes
      `--output-format binary` and parses via `np.frombuffer` view of
      `np.fromfile`. Skips the Python ASCII Jellyfish-FASTA parse +
      _ascii_kmer_to_canonical_u64 round-trip entirely.
    failed_with: |
      v1.1 (b) measurement (chr22 k=21 n_tiles=4 n_passes=4, 2026-04-28):
        runner subprocess wall (binary mode):  33.84 s
        runner subprocess wall (FASTA  mode):  33.03 s
        op-class end-to-end wall:              33.97 s
        silicon-only avg per dispatch:        ~934  µs
        n_dispatches = 3105 chunks × 4 passes = 12,420
        silicon-only summed (12420 × 934µs):   11.6 s
        Python FASTA parse wall (1000 records): 1.7 ms
      Conclusion: the v1.0 root-cause in this entry was MISDIAGNOSED.
      The Python parse is NEGLIGIBLE — 1.7 ms on the top_n=1000 records
      the runner already filters host-side. The remaining ~22 s of e2e
      wall lives INSIDE the C++ runner: the host-side
      std::unordered_map<uint64_t,uint64_t> accumulate of 42 M emit
      records into 30.7 M unique canonicals, plus the per-dispatch
      XRT/IRON setup overhead × 12,420.
    root_cause: |
      Two distinct bottlenecks, both inside the C++ runner (NOT in the
      Python subprocess wrapper):
        1. Per-dispatch overhead × 12,420 dispatches. At ~1.8 ms wall
           per dispatch (including IRON setup + sync_to/from_device +
           kernel launch + wait), 12,420 dispatches ≈ 22 s. Silicon
           compute itself is only 11.6 s of that.
        2. unordered_map<uint64,uint64> of 42 M inserts into 30.7 M
           unique buckets — likely 5-10 s of host CPU.
      The original gap-entry hypothesis (Python ASCII parse of 30 M
      records) was wrong because the runner already applies the
      `--top` filter BEFORE the FASTA emit; the Python side only ever
      saw 1000 records.
    workaround: |
      v1.1 (b) lands the binary-blob wire format anyway — it removes
      the (small) ASCII-emit + Python-parse path on the critical
      output, and is the right wire format for any future v1.1+
      pipeline integration that wants to chain kmer_count's output
      into a downstream NPU op without round-tripping through ASCII.

      The ACTUAL chr22 e2e bottleneck splits cleanly into:
        v1.2 (a) Reduce per-dispatch overhead — pyxrt in-process
                 path + multi-launch / pipelined kernel submit, OR
                 batch multiple chunks per dispatch via larger seq_in
                 BO + per-chunk slot offsets.
        v1.2 (b) Replace runner's std::unordered_map with a faster
                 hash structure (e.g., tsl::robin_map, ankerl::dense
                 hash, or a sorted-merge of per-pass arrays via radix
                 sort). 30.7 M unique × hash insert is the dominant
                 host CPU cost after silicon.
      File these as new gaps; this entry closes after the wire-format
      change since the original misdiagnosed root-cause is gone.
    upstream_issue: null
    blocks: []
    severity: "performance"
    status: "closed"

