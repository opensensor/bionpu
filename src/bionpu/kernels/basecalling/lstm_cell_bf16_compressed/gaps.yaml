  - id: ""
    category: "tooling"
    op_or_pattern: "AIEObjectFifoStatefulTransform split-fifo path drops SparseFifo discardable attrs on the consumer-side ObjectFifoCreateOp, so consumer-side S2MM BDs never get aie.enable_compression"
    attempted: |
      's resolution-path microtest
      (tests/aie2p_microtests/dma_compression_loopback/) was built
      against the post- fork (SHA 73e48b0a) to exercise
      the documented AM029 compute-tile DMA compression contract:
      cross-column SparseFifo (Tile (0,2) -> Tile (1,2)) with
      via_DMA=true to force a real producer/consumer DMA pair.
      Expected outcome: BOTH the producer-side MM2S BD and the
      consumer-side S2MM BD carry aie.enable_compression=true so
      the compress + decompress hardware halves are engaged.
    failed_with: |
      Lowered MLIR
      (state/g-t3.2-006-bd-emit-asymmetry/input_with_addresses-20260425T221658Z.mlir)
      shows ASYMMETRIC emission:
        * Tile (0,2) MM2S BDs (lines 109, 114): ``aie.dma_bd(...)
          {aie.enable_compression = true, ...}`` ✓
        * Tile (1,2) S2MM BDs (lines 136, 141): ``aie.dma_bd(...)
          {bd_id = ..., next_bd_id = ...}`` — NO aie.enable_compression
          attr ✗

      No silicon error (build succeeds; no firmware timeout). The
      defect is silent — a downstream silicon run would attempt
      compression on the producer side without matching
      decompression on the consumer side, with output corruption
      or stream-encoding mismatch as the most likely failure shape.
    root_cause: |
      AIEObjectFifoStatefulTransform splits each cross-tile
      ObjectFifo into a producer-side ObjectFifoCreateOp + a
      separate consumer-side ObjectFifoCreateOp at
      lib/Dialect/AIE/Transforms/AIEObjectFifoStatefulTransform.cpp:1965
      via ``createObjectFifo(builder, datatype, consumerFifoName,
      consumerTile, consumerTile, consumerObjFifoSize, emptyDims,
      fromStreamDims)``. The new consumerFifo gets a few attrs
      copied (disable_synchronization at line 1968-1969,
      iter_count at 1972-1975, aie_stream / aie_stream_port at
      1977-1989) but the SparseFifo discardable triple
      (aie.compress_mm2s, aie.decompress_s2mm, aie.sparsity_pattern,
      aie.sparsity_n, aie.sparsity_m, set by aie.iron.sparse.SparseFifo.resolve())
      is NOT propagated.

      When createDMA -> createAIETileDMA -> createBdBlock runs
      for the consumer-side BDs, propagateSparseCompressionAttr
      (line 918) is called with the consumer-side fifo op and
      finds no aie.decompress_s2mm attr to read, so it returns
      without setting aie.enable_compression on the consumer BD.

      Why the lit test missed it: the existing lit test
      (test/Conversion/DmaToNpu/dma_to_npu_sparse_compression.mlir)
      verifies only the FINAL hop — given a hand-constructed
      ``aiex.npu.writebd {aie.enable_compression = true}`` op,
      the BD-emit pass flips bit 31. It does NOT drive the
      pipeline from an ObjectFifoCreateOp + SparseFifo discardable
      attrs end-to-end through AIEObjectFifoStatefulTransform's
      split-fifo path.
    workaround: |
      None applied yet. Three options for closure:

      (1) **Fork patch (correct fix).** Insert attr-propagation
          for the SparseFifo discardable triple right after
          ``replaceSplitFifo(createOp, consumerFifo, consumerTileOp);``
          at line 1976. About 10 lines: copy
          {aie.compress_mm2s, aie.decompress_s2mm,
           aie.sparsity_pattern, aie.sparsity_n, aie.sparsity_m}
          from createOp's discardable attrs to consumerFifo if
          present. Then extend the lit test to drive the full
          pipeline via aie-opt --aie-objectfifo-stateful-transform
          | --aie-dma-to-npu and CHECK both producer and consumer
          BDs.
      (2) **Microtest workaround (diagnostic only).** Pin
          aie.enable_compression manually on the consumer-side
          BD via a post-lowering pass or hand-edit of the lowered
          MLIR. Lets the silicon test go ahead but doesn't fix
          the LSTM kernel.
      (3) **Document and pause silicon test.** Capture finding,
          flag 's silicon run as gated on (1), do not
          run the microtest until the consumer-side bit is real.

      Recommended: (1). The fork repo
      (https://github.com/opensensor/mlir-aie) has a clean place
      to land this on top of the branch; the lit-test
      extension is mechanical.

      Parallel finding (re-audit ask flagged in 's
      cross-module footgun): the propagation should also
      discriminate compute-tile MEMORY_MODULE BDs from memory-tile
      MEMORY_TILE_MODULE BDs — bit 31 is Enable_Compression on the
      former but D0_Pad_Before on the latter. ``createDMA`` already
      branches on producer tile type (line 944-955); the
      compression-attr propagation should respect the same
      discrimination.
    upstream_issue: null
