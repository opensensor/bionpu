  - id: ""
    category: "correctness"
    op_or_pattern: "Multi-tile cascade-stream LSTM kernel firmware-timeout on AIE2P silicon"
    attempted: |
      After 's consolidated-weight ABI fix lands the host
      call submits cleanly, the multi-tile cascade-stream kernel was
      dispatched once on AIE2P silicon under the swarm NPU mutex.
      The host runner returns "PASS" (no XRT exception, no
      std::out_of_range) but the output buffer remains all-zero and
      the per-iteration NPU time is 5.9s, which equals the firmware
      TDR (Timeout Detection & Recovery) window. dmesg's
      ``aie2_tdr_work counter`` advanced from 451 to 454 across the
