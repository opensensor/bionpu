    status: "closed"
    closure_ref:
      summary: "T8 ratification (outer-repo only; no fork mutation): per-layer bf16 NPU vs FP32 PyTorch on REAL Dorado fast@v5.0.0 weights swept across 3 input seeds × 5 layers = 15 NPU dispatches. Worst per-layer max-abs (across seeds) = 0.4998 on lstm_L2_fwd (input max-abs 1.0, weight max-abs 3.23); all per-layer numbers beat the worst documented Padé per-cell baseline (1.051 on lstm_L4_fwd) by >2x. End-to-end 5-layer chained bf16 stack (seed 20260425, no conv-stem NPU dispatch) = 0.459 max-abs vs FP32, dramatically better than the b-m6 documented 2.458 on the encoder.py path (that wash finding stands as a research note — see workaround field — driven by the lstm_L2 cell's 2.3x-worse-than-Padé per-cell error compounding through the chain). Closure gates met: (a) every per-layer beats the worst Padé per-cell baseline 1.051, (b) global per-cell <= 0.55 regression ceiling, (c) end-to-end chained <= 2.5. Sanity-check on real-weights distribution: lstm_L5 weight max-abs measured at 13.19 — matches gap text's 'L5 reaches ~13.2' claim, confirming real Dorado weights actually loaded vs synthetic. Evidence: state/swarm/t8/measurement-20260425T231350Z.json (per-layer × per-seed matrix), state/swarm/t8/measurement-20260425T231351Z.json (end-to-end chained), state/g-t6.4-004/ (parallel copies), tests/test_lstm_bf16_dorado_weights.py (5 tests, all PASS, zero amdxdna dmesg lines added). Test method: torch.nn.LSTM FP32 reference for each layer, bf16 NPU output via DoradoFastLstmCellBf16 op (silicon mutex /tmp/bionpu-npu-silicon.lock acquired). Closure decision: worst per-layer 0.4998 sits comfortably below the Padé worst 1.051 — bf16 strictly wins per-cell on real weights, the gap text's primary 'per-cell wins' research claim is ratified. The end-to-end wash finding remains a research note for / (mixed-precision exploration), not a closure blocker. Branch: swarm/T8-bf16-lstm-dorado-weights."
